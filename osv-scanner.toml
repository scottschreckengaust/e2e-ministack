id = "CVE-2026-57432"
reason = "VEX not_affected (vulnerable_code_cannot_be_controlled_by_adversary) — Accepted risk: the MiniStack emulator is a local-only CI dependency — it binds port 4566 on loopback, runs ephemerally inside the CI job (torn down each run), is never network-exposed, and is exercised solely by this repository's own CDK/SDK test traffic. No adversary can supply crafted input that reaches the vulnerable perl code in this deployment, and the image is not a production/deployed artifact. It is a third-party image pinned by digest that this repo cannot patch. Severity note: Trivy rates this HIGH (perl <= 5.43.10 integer overflow); it surfaced on the unchanged pinned digest as scanner DBs updated, not from a digest bump. Fix state: no fixed version at the pinned perl-base 5.40.1-6 (empty fixed-version column); nothing to remediate by bumping the digest. Revisit on the next MiniStack image rebuild (revisit_by: wait-for-image-rebuild)."

[[IgnoredVulns]]
id = "CVE-2026-57433"
reason = "VEX not_affected (vulnerable_code_cannot_be_controlled_by_adversary) — Accepted risk: the MiniStack emulator is a local-only CI dependency — it binds port 4566 on loopback, runs ephemerally inside the CI job (torn down each run), is never network-exposed, and is exercised solely by this repository's own CDK/SDK test traffic. CVE-2026-57433 is a signed integer overflow in the Perl Storable module (retrieve_hook_common in Storable.xs) when deserializing a crafted SX_HOOK record, causing a panic (denial of service, not code execution); it is only reachable when an application calls Storable::thaw/retrieve on attacker-controlled serialized data. MiniStack does not deserialize adversary-controlled Storable blobs in this deployment, so no adversary can reach the vulnerable code, and the image is not a production/deployed artifact. It is a third-party image pinned by digest that this repo cannot patch. Fix state: a fix exists (Storable 3.41; Debian perl 5.40.1-8, currently in forky/sid and marked fixed) but is NOT yet in trixie, which still ships the vulnerable 5.40.1-6 (Debian trixie status: vulnerable); this record is dropped the moment a rebuilt MiniStack digest ships the patched perl. Awaiting a MiniStack image rebuild. NVD has not yet scored it (CISA-ADP CVSSv3.1 9.8 only). Upstream advisory: https://nvd.nist.gov/vuln/detail/CVE-2026-57433."

