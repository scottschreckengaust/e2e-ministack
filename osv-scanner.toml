[[IgnoredVulns]]
id = "CVE-2024-23342"
reason = "VEX not_affected (vulnerable_code_not_in_execute_path) — CVE-2024-23342 is the Minerva timing side-channel in ECDSA signing (sign_digest/private-key operations). ecdsa is a transitive dependency of checkov (pinned in .github/scanner-requirements/iac/requirements.txt); this repo only runs checkov to scan local synthesized CloudFormation templates offline, so it never signs, holds no private keys, and exposes no attacker-observable timing channel, leaving the vulnerable signing path unreachable. Modeled as a direct-product purl (not a checkov subcomponent) because the filesystem/lockfile scanners (grype-fs, trivy-fs) that consume this record catalog ecdsa as a top-level component of the requirements file, and go-vex only suppresses when the statement's product purl matches the scanned component."

[[IgnoredVulns]]
id = "CVE-2025-71176"
reason = "VEX not_affected (vulnerable_code_not_present) — CVE-2025-71176 is pytest's insecure tmpdir handling (fixed in pytest 9.0.3). This repo is a TypeScript/Node CDK app; it does NOT install or run pytest. grype catalogs pytest@8.4.2 ONLY because the aws-cdk npm package bundles Python project SCAFFOLDING templates (node_modules/aws-cdk/lib/init-templates/{app,sample-app}/python/requirements-dev.txt) that `cdk init --language python` copies to generate a NEW, separate Python project. Those template files are inert data inside a dependency — never installed into a Python environment here, never on any import/execute path — so the vulnerable code is not present in anything this repo runs. Surfaced only after the Grype FS gate floor was dropped to its strictest rung (negligible) in #284; recorded as an honest not_affected (vulnerable_code_not_present), matching the ecdsa filesystem-surface record. Modeled as a direct pypi product purl (not an aws-cdk subcomponent) because the filesystem/lockfile scanners (grype-fs, trivy-fs) that consume this record catalog pytest as a top-level component of the template requirements file, and go-vex only suppresses when the statement's product purl matches the scanned component. Revisit when aws-cdk bumps the pytest pin in its bundled init-templates (cosmetic here — it changes no code this repo executes)."
