# Trivy configuration (auto-discovered when trivy runs in this directory).
#
# Scan POLICY — severity gating, exit codes, scanners, output format — lives in
# the workflow flags (.github/workflows/security.yml, trivy-fs / trivy-image
# jobs), NOT here, so a config value can't silently conflict with the CI
# invocation. The ONE exception is the VEX list below (see its note).
#
# Failure policy is set in the jobs: trivy-fs is report-only; trivy-image is
# hard-fail + VEX-gated (#84). Do NOT add `severity:` / `exit-code:` here — a
# value here would apply to BOTH jobs; trivy-image sets severity + exit-code via
# the trivy-action's `severity`/`exit-code`/`limit-severities-for-sarif` inputs.

# Skip generated / vendored trees the source scan shouldn't flag. cdk.out is
# synthesized CloudFormation (already covered by checkov/cfn-lint); node_modules
# is the dependency tree (already covered by the lockfile scanners).
scan:
  skip-dirs:
    - node_modules
    - cdk.out

# OpenVEX finding suppression (#84). Trivy reads this file NATIVELY from the CWD
# (the trivy-action invokes `trivy <type> <ref>` with no explicit flags and does
# NOT forward the `--vex` flag / `TRIVY_VEX` env — verified against
# trivy-action v0.36.0's entrypoint), so the VEX file list MUST live here, not in
# a workflow env, to actually reach trivy. `vulnerability.vex` takes explicit
# FILE paths (it rejects a bare directory and does not glob), so every accepted
# record is enumerated below. This list feeds BOTH trivy jobs (auto-discovered
# from CWD): the MiniStack-image `CVE-*` records target deb/generic image-package
# purls and drive the hard-fail `trivy-image` gate while being inert on the
# report-only `trivy-fs` source scan; the pypi-surface `ecdsa` record is the
# mirror — it suppresses the `ecdsa` finding in the relocated pip requirements
# file on `trivy-fs` and is inert on the image (#226 wired the FS surface to VEX;
# previously ecdsa was excluded here because no VEX-consuming FS scan cataloged
# it). Only `not_affected`/`fixed` records suppress; a future `affected` record
# (e.g. mcp) deliberately still surfaces. Keep this list in lockstep with the
# `.vex/*.openvex.json` set (add/remove a file -> add/remove a line here); #76
# audits the drift. See .vex/README.md and docs/SECURITY-TOOLING.md.
vulnerability:
  vex:
    - .vex/ecdsa-CVE-2024-23342.openvex.json
    - .vex/CVE-2005-2541.openvex.json
