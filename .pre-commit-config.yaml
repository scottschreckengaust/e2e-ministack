# Fast local pre-commit tier. Slow gates (cdk-nag synth, checkov, CodeQL,
# grype, the MiniStack E2E deploy) stay in CI — see .github/workflows/.
# Install once:  pre-commit install
# Run on demand: pre-commit run --all-files
#
# NOTE: client-side hooks are a convenience, not an enforcing control
# (bypassable with `git commit --no-verify`, absent until `pre-commit install`).
# CI remains the source of truth.

minimum_pre_commit_version: '3.5.0'
fail_fast: false

repos:
  # ── Standard hygiene: all the bells and whistles ───────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files # block accidentally committed big blobs
        args: ['--maxkb=1024']
      - id: check-merge-conflict # leftover <<<<<<< markers
      - id: check-case-conflict # names that collide on case-insensitive FS
      - id: check-symlinks # broken symlinks
      - id: destroyed-symlinks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-vcs-permalinks
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: check-json # validates threat-model.tc.json, cdk.json, package.json
        exclude: ^tsconfig\.json$ # JSONC (has comments) — not strict JSON
      - id: check-yaml # validates the workflow files
      - id: detect-private-key # committed PEM/SSH keys
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']
      - id: forbid-submodules

  # ── Secrets ────────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # ── GitHub Actions workflow lint (fast) ────────────────────────────────
  # gitleaks and actionlint build from Go source on install (works as-is for
  # most). Workaround ONLY if your network can't reach proxy.golang.org (e.g.
  # corporate TLS interception): run `go env -w GOPROXY=direct` once, then
  # reinstall the hooks (persists across shells via Go's env config).
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # ── Project TypeScript toolchain (local — reuses pinned node_modules) ──
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npm run lint --
        language: system
        files: \.ts$
        pass_filenames: false
      - id: tsc
        name: tsc (type check)
        entry: npm run build
        language: system
        files: \.ts$
        pass_filenames: false
      - id: markdownlint
        name: markdownlint-cli2
        entry: npm run lint:md
        language: system
        files: \.md$
        pass_filenames: false
      - id: prettier
        name: prettier (format check)
        entry: npm run format:check
        language: system
        # Prettier governs formatting for all its supported types here.
        files: \.(ts|js|mjs|json|jsonc|md|ya?ml)$
        pass_filenames: false
