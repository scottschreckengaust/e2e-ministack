# Fast local pre-commit tier. Slow gates (cdk-nag synth, checkov, CodeQL,
# grype, the MiniStack E2E deploy) stay in CI — see .github/workflows/.
# Install once:  pre-commit install
# Run on demand: pre-commit run --all-files
#
# NOTE: client-side hooks are a convenience, not an enforcing control
# (bypassable with `git commit --no-verify`, absent until `pre-commit install`).
# CI remains the source of truth.

minimum_pre_commit_version: '3.5.0'
fail_fast: false

repos:
  # ── Standard hygiene: all the bells and whistles ───────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files # block accidentally committed big blobs
        args: ['--maxkb=1024']
      - id: check-merge-conflict # leftover <<<<<<< markers
      - id: check-case-conflict # names that collide on case-insensitive FS
      - id: check-symlinks # broken symlinks
      - id: destroyed-symlinks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-vcs-permalinks
      # Byte-exact fixtures the hygiene hooks must NOT rewrite: the
      # @aws-cdk/integ-runner cloud-assembly snapshots (#168) and the fuzz
      # corpora (#165), whose trailing spaces, CRLF, missing final newline and
      # raw binary are INTENTIONAL inputs the parsers must survive.
      - id: end-of-file-fixer
        exclude: ^(integ/.*\.js\.snapshot/|fuzz/corpus-[^/]+/)
      - id: trailing-whitespace
        exclude: ^fuzz/corpus-[^/]+/
      - id: mixed-line-ending
        args: ['--fix=lf']
        exclude: ^fuzz/corpus-[^/]+/
      - id: check-json # validates threat-model.tc.json, cdk.json, package.json
        exclude: ^tsconfig(\.scripts)?\.json$ # JSONC (has comments) — not strict JSON
      - id: check-yaml # validates the workflow files
      - id: detect-private-key # committed PEM/SSH keys
      # detect-aws-credentials removed: false-positives on @aws-cdk/* package
      # names, test/** gitignore lines, and CDK snapshot metadata (checkSecretUsage).
      # gitleaks + detect-private-key cover real credential leaks.
      - id: forbid-submodules

  # ── Secrets ────────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # ── Shell script lint ──────────────────────────────────────────────────
  # Gates standalone *.sh files (e.g. the resolve-open-issues eval harness).
  # actionlint (below) only shellchecks `run:` blocks inside workflow YAML, so
  # this hook covers the standalone-script gap. Mirrored by the `shellcheck`
  # job in ci.yml (CI is the enforcing source of truth). shellcheck-py vendors
  # the shellcheck binary, so no separate install is needed.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # ── GitHub Actions workflow lint (fast) ────────────────────────────────
  # gitleaks and actionlint build from Go source on install (works as-is for
  # most). Workaround ONLY if your network can't reach proxy.golang.org (e.g.
  # corporate TLS interception): run `go env -w GOPROXY=direct` once, then
  # reinstall the hooks (persists across shells via Go's env config).
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # ── Project TypeScript toolchain (local — reuses pinned node_modules) ──
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npm run lint --
        language: system
        files: \.ts$
        pass_filenames: false
      - id: tsc
        name: tsc (type check)
        entry: npm run build
        language: system
        files: \.ts$
        pass_filenames: false
      - id: markdownlint
        name: markdownlint-cli2
        entry: npm run lint:md
        language: system
        files: \.md$
        pass_filenames: false
      - id: prettier
        name: prettier (format check)
        entry: npm run format:check
        language: system
        # Prettier governs formatting for all its supported types here.
        files: \.(ts|js|mjs|json|jsonc|md|ya?ml)$
        pass_filenames: false
      - id: mcp-config-drift
        name: mcp config drift (canonical .mcp.json -> per-agent files)
        # Fail if a committed per-agent MCP config (.cursor/.vscode/.gemini/.codex)
        # drifts from the canonical .mcp.json (#111). Fix: `npm run sync:mcp-config`.
        entry: npm run check:mcp-parity
        language: system
        files: ^(\.mcp\.json|\.cursor/mcp\.json|\.vscode/mcp\.json|\.gemini/settings\.json|\.codex/config\.toml|scripts/sync-mcp-config\.(ts|mjs))$
        pass_filenames: false
