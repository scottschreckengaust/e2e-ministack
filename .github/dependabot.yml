# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

# Ensure the file passes validation:
# ```shell
# % npx @bugron/validate-dependabot-yaml .github/dependabot.yml
# ```

version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    # Wait 7 days before proposing a newly published action version — a fresh
    # release can be malicious or unstable (supply-chain caution).
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'chore(deps): update github-actions'
    groups:
      github-actions-version-updates:
        patterns:
          - '*'
