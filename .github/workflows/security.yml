name: Security

on:
  push:
  pull_request:
  workflow_dispatch: # allow manual runs
  schedule:
    # Weekly run so newly-disclosed CVEs are caught even without a push.
    - cron: '0 6 * * 1'

# Least privilege by default; jobs opt into more where needed.
permissions:
  contents: read

# Cancel superseded runs for the same ref so rapid pushes don't pile up
# duplicate scanner runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide which jobs are relevant for this event. On schedule/dispatch
  # everything runs; on push/PR the IaC synth job gates on whether CDK/source
  # paths changed. This mirrors ci.yml's `changes` job style and exists so the
  # heavy `npm run synth` (cdk-nag) doesn't re-run on doc-only pushes — that
  # synth already runs in ci.yml's `unit` gate, so duplicating it here on a
  # doc-only change is pure waste (issue #15). The SAST/dependency/secret
  # scanners are intentionally NOT gated: they should keep running on code,
  # dependency, and workflow changes regardless.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      iac: ${{ steps.filter.outputs.iac }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Only run path detection on push/PR — on dispatch/schedule the event has
      # no `before` SHA, so paths-filter prints a noisy fallback, and the iac
      # job already force-runs on those events anyway.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        with:
          # Anything that can change the synthesized CloudFormation template.
          filters: |
            iac:
              - 'bin/**'
              - 'lib/**'
              - 'lambda/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'cdk.json'
              - '.github/workflows/security.yml'
              - '.github/actions/setup/**'

  # ── Static analysis of the TypeScript / CDK source ──────────────────────
  codeql:
    name: CodeQL (JS/TS)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: javascript-typescript
          # Pin the analyzer bundle so the CodeQL engine/queries are reproducible
          # (otherwise the action auto-updates to the latest bundle).
          tools: https://github.com/github/codeql-action/releases/download/codeql-bundle-v2.25.6/codeql-bundle.tar.gz
      # CodeQL uploads its own SARIF to the Security tab natively.
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Pin the Python used to install Semgrep so the hash-pinned requirements
      # file (resolved against 3.12) installs reproducibly.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Run Semgrep (always writes SARIF; enforce after upload)
        run: |
          # Content-pinned install: every dist is hash-verified against the
          # committed lockfile (--require-hashes), so a re-published PyPI
          # artifact is rejected. Pin lives in scanner-requirements/semgrep.txt.
          pip install --require-hashes -r .github/scanner-requirements/semgrep.txt
          # --error sets a non-zero exit on findings; capture it so the report
          # still uploads, then enforce in a later step.
          set +e
          semgrep scan --config=auto --error --sarif --output semgrep.sarif \
            --exclude=node_modules --exclude=cdk.out
          echo "exit=$?" > semgrep.outcome
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: warn
      - name: Enforce Semgrep result
        if: always()
        run: |
          source semgrep.outcome
          test "$exit" = "0"

  # ── Dependency / supply-chain vulnerabilities ───────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: npm audit (JSON report; enforce after upload)
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit.json
          echo "exit=$?" > npm-audit.outcome
          npm audit --audit-level=high # human-readable in the log
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-audit-json
          path: npm-audit.json
          if-no-files-found: warn
      - name: Enforce audit result
        if: always()
        run: |
          source npm-audit.outcome
          test "$exit" = "0"

  osv-scanner:
    name: OSV Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install OSV-Scanner
        # Pinned to v2.4.0 AND verified by SHA-256 so a re-tagged/tampered
        # release is rejected (content pin, not just a tag pin).
        run: |
          curl -sSfL -o osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64
          echo "15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0  osv-scanner" | sha256sum -c -
          chmod +x osv-scanner
      - name: Scan lockfile (SARIF; enforce after upload)
        run: |
          # OSV-Scanner v2 form: `scan source --lockfile=…`. The bare
          # `scan --lockfile=` is deprecated and slated for removal.
          set +e
          ./osv-scanner scan source --lockfile=package-lock.json --format sarif > osv.sarif
          echo "exit=$?" > osv.outcome
          ./osv-scanner scan source --lockfile=package-lock.json # human-readable
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: osv.sarif
          category: osv-scanner
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: osv-sarif
          path: osv.sarif
          if-no-files-found: warn
      - name: Enforce OSV result
        if: always()
        run: |
          source osv.outcome
          test "$exit" = "0"

  # PR-time dependency-diff gate (#77). Unlike the always-on scanners above,
  # this only runs on pull_request: it diffs the PR's dependency changes
  # against the GitHub Advisory DB and a license policy, blocking the PR
  # before a vulnerable or copyleft/non-FOSS dependency is ever merged.
  #
  # License policy = ALLOW-list. `deny-licenses` is deprecated and slated for
  # removal (upstream issue 997): a blocklist gives false security — it's easy
  # to miss a commercial/copyleft license you didn't enumerate (e.g. Elastic).
  # An allow-list fails CLOSED on any *detected* license not on the list, which
  # is the right posture for the repo's FOSS-only governance line (the same one
  # that rejected k6/AGPL in #73 and removed Renovate/AGPL). The list below is
  # the exhaustive set of permissive licenses actually present in the tree
  # (verified with `license-checker`); refresh it when a new permissive dep is
  # introduced. Trivy's license scan (separate job) is the full-tree backstop
  # for the *undetected*-license gap, which neither list mode fails closed on.
  # See docs/SECURITY-TOOLING.md.
  dependency-review:
    name: Dependency review (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # PR-only: the action needs the PR's base↔head dependency diff. It is a
    # no-op (and errors) on push/schedule/dispatch, so gate it to pull_request.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Align with the existing `npm audit --audit-level=high` posture.
          # To triage everything during a rollout, temporarily lower this to
          # `low` (emit-all), then ratchet back to `high`.
          fail-on-severity: high
          # ALLOW-list: exhaustive set of permissive licenses present in the
          # tree (verified with `license-checker`). Any *detected* license not
          # here fails the PR — so copyleft/commercial introductions (GPL,
          # AGPL, LGPL, MPL, EPL, SSPL, BUSL, Elastic, …) are blocked by
          # omission, with no enumerate-every-bad-id maintenance.
          # Dual licenses like `(MIT OR GPL-3.0-or-later)`, `(MIT OR CC0-1.0)`,
          # `(BSD-2-Clause OR MIT OR Apache-2.0)` stay GREEN — the OR is
          # satisfied by an allowed member. Refresh this list when a new
          # permissive dep is introduced (the PR adding it will flag it here).
          allow-licenses: >-
            MIT, Apache-2.0, ISC,
            BSD-2-Clause, BSD-3-Clause, 0BSD,
            BlueOak-1.0.0, Python-2.0,
            CC0-1.0, CC-BY-4.0, Unlicense

  grype:
    name: Grype FS scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # The anchore action emits SARIF and (with fail-build) sets the outcome;
      # capture its output path and always upload.
      - id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: '.'
          fail-build: true
          severity-cutoff: high
          output-format: sarif
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: grype-sarif
          path: ${{ steps.grype.outputs.sarif }}
          if-no-files-found: warn

  # ── Third-party container image (MiniStack emulator) ───────────────────
  # The MiniStack image runs with the host Docker socket mounted and
  # --network host (see ci.yml), which the threat model flags as untrusted
  # input. The Grype "FS scan" job above only scans the repo source (path '.'),
  # so nothing inspects the contents of the image itself. This job scans the
  # image BY ITS PINNED DIGEST so a newly-disclosed CVE in the emulator is
  # surfaced even though we can't patch a third-party image.
  #
  # Failure policy: REPORT-ONLY (fail-build: false). The image is third-party
  # and pinned by digest; we cannot remediate CVEs inside it by editing this
  # repo, so hard-failing CI on its findings would only block work on issues
  # we can't fix. Instead we always emit + upload SARIF (artifact + Security
  # tab) so findings stay visible and actionable (e.g. bumping the pinned
  # digest once MiniStack ships a fix). The weekly schedule above keeps this
  # current as new CVEs are disclosed.
  ministack-image:
    name: Grype MiniStack image scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # NOTE: this digest MUST match the image pinned in ci.yml
      # (ministackorg/ministack:full@sha256:c5ce466...). Keep them in sync;
      # if ci.yml bumps the digest, bump it here too.
      - id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: 'ministackorg/ministack:full@sha256:c5ce466eb2e73b5f3af86a5a1aea780c1e8fcf8f04ec0e2042a5cf759d6dcdd3'
          # Report-only: third-party image we can't patch (see comment above).
          fail-build: false
          severity-cutoff: high
          output-format: sarif
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-ministack-image
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: grype-ministack-image-sarif
          path: ${{ steps.grype.outputs.sarif }}
          if-no-files-found: warn

  # ── Software Bill of Materials ──────────────────────────────────────────
  # Syft generates a CycloneDX SBOM of the dependency tree (#77). Unlike the
  # vuln scanners this is INFORMATIONAL — there is no enforce step; it just
  # produces and always-uploads the SBOM artifact (the "produce → upload"
  # half of the repo pattern, minus enforce). CycloneDX is the chosen format;
  # the SBOM is artifact-only for now (attach to releases later when a release
  # process exists). It also feeds Grype/Trivy, which can consume an SBOM for
  # consistent component coverage.
  sbom:
    name: SBOM (Syft / CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: '.'
          format: cyclonedx-json
          output-file: sbom.cdx.json
          # We upload the artifact ourselves (below) with the repo's standard
          # if: always() pattern, so disable the action's own release upload.
          upload-artifact: false
      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: warn

  # ── Secrets ─────────────────────────────────────────────────────────────
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # full history so all commits are scanned
          persist-credentials: false
      - name: Install gitleaks
        # Pinned v8.30.1 + SHA-256 verify (content pin, not just a tag).
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
      - name: Run gitleaks (SARIF; enforce after upload)
        run: |
          set +e
          ./gitleaks detect --no-banner --redact \
            --report-format sarif --report-path gitleaks.sarif
          echo "exit=$?" > gitleaks.outcome
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: warn
      - name: Enforce gitleaks result
        if: always()
        run: |
          source gitleaks.outcome
          test "$exit" = "0"

  # ── Infrastructure-as-code (synthesized CloudFormation) ─────────────────
  iac:
    name: IaC scan (cfn-lint + checkov)
    # Gate the heavy `npm run synth` to events that can change the template
    # (issue #15): CDK/source path changes, or schedule/dispatch. On a doc-only
    # push this is pure duplication of ci.yml's synth gate, so skip it natively
    # — no cross-workflow artifact download, no added permissions.
    needs: changes
    if: needs.changes.outputs.iac == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      # Pin the Python used to install the scanners so the hash-pinned
      # requirements file (resolved against 3.12) installs reproducibly.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Synthesize CloudFormation
        run: npm run synth
      - name: Install scanners
        # Content-pinned install: every dist is hash-verified against the
        # committed lockfile (--require-hashes), so a re-published PyPI artifact
        # is rejected. Pins live in scanner-requirements/iac.txt.
        run: pip install --require-hashes -r .github/scanner-requirements/iac.txt
      - name: cfn-lint (text report; errors-only enforce after upload)
        # cfn-lint is a linter (not a vuln scanner) and its SARIF formatter
        # needs unbundled deps, so keep it as text. Only the two expected W
        # warnings here; fail on errors only.
        run: |
          set +e
          cfn-lint cdk.out/*.template.json > cfn-lint.txt 2>&1
          cat cfn-lint.txt
          cfn-lint cdk.out/*.template.json --non-zero-exit-code error
          echo "exit=$?" > cfn-lint.outcome
      - name: checkov (SARIF; enforce after upload)
        run: |
          set +e
          checkov -d cdk.out --framework cloudformation -o sarif --output-file-path . --compact
          echo "exit=$?" > checkov.outcome
          checkov -d cdk.out --framework cloudformation --compact # human-readable
      - name: Upload checkov SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: results_sarif.sarif
          category: checkov
      - name: Upload IaC reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: iac-reports
          path: |
            cfn-lint.txt
            results_sarif.sarif
          if-no-files-found: warn
      - name: Enforce IaC results
        if: always()
        run: |
          source cfn-lint.outcome; cfn=$exit
          source checkov.outcome; ckv=$exit
          echo "cfn-lint exit=$cfn  checkov exit=$ckv"
          test "$cfn" = "0" && test "$ckv" = "0"

  # ── Threat model (design-time artifact) ─────────────────────────────────
  threat-model:
    name: Threat model
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Node-only job (no dependency install): the validation below just runs
      # `node -e` over the committed JSON, so skip `npm ci`.
      - uses: ./.github/actions/setup
        with:
          npm-ci: 'false'
      # threat-composer is a design-time authoring tool (no CI generator that
      # works without a real Bedrock account), so the gate is simply: the
      # committed model parses and carries the expected sections. Edit it in
      # the Threat Composer app / VS Code extension; expand as the stack grows.
      - name: Validate threat-model.tc.json
        run: |
          node -e '
            const tc = require("./threat-model.tc.json");
            const need = ["schema","applicationInfo","threats","mitigations","assumptions"];
            const missing = need.filter((k) => !(k in tc));
            if (missing.length) { console.error("Missing sections:", missing); process.exit(1); }
            if (!tc.threats.length) { console.error("No threats defined"); process.exit(1); }
            console.log("threat-model.tc.json OK:", tc.threats.length, "threats");
          '

  # ── GitHub Actions workflow hardening ───────────────────────────────────
  # actionlint (correctness: schema, shellcheck) and zizmor (security:
  # injection, unpinned actions, permissions) together lint the workflow files.
  actionlint:
    name: Actionlint (workflow correctness)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Run actionlint
        # Content-pinned: download the release tarball directly and verify its
        # SHA-256 (matches the OSV/gitleaks pattern) instead of piping a
        # download script fetched unpinned-by-hash from raw.githubusercontent.com.
        # Hash is the published actionlint_1.7.12_checksums.txt entry for
        # linux_amd64. actionlint also runs shellcheck on `run:` blocks.
        run: |
          curl -sSfL -o actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          chmod +x actionlint
          ./actionlint -color

  zizmor:
    name: Zizmor (Actions audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
