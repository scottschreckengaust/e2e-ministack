name: Security

on:
  push:
  pull_request:
  workflow_dispatch: # allow manual runs
  schedule:
    # Weekly run so newly-disclosed CVEs are caught even without a push.
    - cron: '0 6 * * 1'

# Least privilege by default; jobs opt into more where needed.
permissions:
  contents: read

# Cancel superseded runs for the same ref so rapid pushes don't pile up
# duplicate scanner runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Static analysis of the TypeScript / CDK source ──────────────────────
  codeql:
    name: CodeQL (JS/TS)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: javascript-typescript
          # Pin the analyzer bundle so the CodeQL engine/queries are reproducible
          # (otherwise the action auto-updates to the latest bundle).
          tools: https://github.com/github/codeql-action/releases/download/codeql-bundle-v2.25.6/codeql-bundle.tar.gz
      # CodeQL uploads its own SARIF to the Security tab natively.
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Pin the Python used to install Semgrep so the hash-pinned requirements
      # file (resolved against 3.12) installs reproducibly.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Run Semgrep (always writes SARIF; enforce after upload)
        run: |
          # Content-pinned install: every dist is hash-verified against the
          # committed lockfile (--require-hashes), so a re-published PyPI
          # artifact is rejected. Pin lives in scanner-requirements/semgrep.txt.
          pip install --require-hashes -r .github/scanner-requirements/semgrep.txt
          # --error sets a non-zero exit on findings; capture it so the report
          # still uploads, then enforce in a later step.
          set +e
          # --exclude=docs/superpowers: the brainstorming spec/plan artifacts
          # (#150/#161) write out this repo's SHA/digest PINS in prose + code
          # fences, which the generic `detected-sonarqube-docs-api-key` rule
          # matches ("sonar…<40-hex>"). Those are public, required pins in
          # non-shippable design docs — a proven false positive (same rule the
          # sonarqube job's inline nosemgrep addresses), excluded at the
          # directory level here since per-line nosemgrep in markdown prose is
          # impractical. Does NOT blind semgrep to any executable code.
          semgrep scan --config=auto --error --sarif --output semgrep.sarif \
            --exclude=node_modules --exclude=cdk.out --exclude=docs/superpowers
          echo "exit=$?" > semgrep.outcome
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: semgrep.sarif
          category: semgrep
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: warn
      - name: Enforce Semgrep result
        if: always()
        run: |
          source semgrep.outcome
          test "$exit" = "0"

  # ── Dependency / supply-chain vulnerabilities ───────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: npm audit (JSON report; enforce after upload)
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit.json
          echo "exit=$?" > npm-audit.outcome
          npm audit --audit-level=high # human-readable in the log
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-audit-json
          path: npm-audit.json
          if-no-files-found: warn
      - name: Enforce audit result
        if: always()
        run: |
          source npm-audit.outcome
          test "$exit" = "0"

  osv-scanner:
    name: OSV Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install OSV-Scanner
        # Pinned to v2.4.0 AND verified by SHA-256 so a re-tagged/tampered
        # release is rejected (content pin, not just a tag pin).
        run: |
          curl -sSfL -o osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64
          echo "15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0  osv-scanner" | sha256sum -c -
          chmod +x osv-scanner
      - name: Scan lockfile (SARIF; enforce after upload)
        run: |
          # OSV-Scanner v2 form: `scan source --lockfile=…`. The bare
          # `scan --lockfile=` is deprecated and slated for removal.
          set +e
          ./osv-scanner scan source --lockfile=package-lock.json --format sarif > osv.sarif
          echo "exit=$?" > osv.outcome
          ./osv-scanner scan source --lockfile=package-lock.json # human-readable
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: osv.sarif
          category: osv-scanner
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: osv-sarif
          path: osv.sarif
          if-no-files-found: warn
      - name: Enforce OSV result
        if: always()
        run: |
          source osv.outcome
          test "$exit" = "0"

  # PR-time dependency-diff gate (#77). Unlike the always-on scanners above,
  # this only runs on pull_request: it diffs the PR's dependency changes
  # against the GitHub Advisory DB and a license policy, blocking the PR
  # before a vulnerable or copyleft/non-FOSS dependency is ever merged.
  #
  # License policy = ALLOW-list. `deny-licenses` is deprecated and slated for
  # removal (upstream issue 997): a blocklist gives false security — it's easy
  # to miss a commercial/copyleft license you didn't enumerate (e.g. Elastic).
  # An allow-list fails CLOSED on any *detected* license not on the list, which
  # is the right posture for the repo's FOSS-only governance line (the same one
  # that rejected k6/AGPL in #73 and removed Renovate/AGPL). The list below is
  # the exhaustive set of permissive licenses actually present in the tree
  # (verified with `license-checker`); refresh it when a new permissive dep is
  # introduced. Trivy's license scan (separate job) is the full-tree backstop
  # for the *undetected*-license gap, which neither list mode fails closed on.
  # See docs/SECURITY-TOOLING.md.
  dependency-review:
    name: Dependency review (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # PR-only: the action needs the PR's base↔head dependency diff. It is a
    # no-op (and errors) on push/schedule/dispatch, so gate it to pull_request.
    if: github.event_name == 'pull_request'
    # pull-requests: write is required by comment-summary-in-pr (below), which
    # posts the full vuln+license review as a single (overwritten) PR comment.
    # issues: write is required by the license-UNKNOWN triage step (#127 Leg
    # B1), which files/updates `license-review` issues for unlicensed deps.
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - id: review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Post the full vuln + license review summary as a PR comment on
          # every run (not just failures) so the complete output is visible
          # without digging into job logs. Each run overwrites the prior one.
          comment-summary-in-pr: always
          # Align with the existing `npm audit --audit-level=high` posture.
          # To triage everything during a rollout, temporarily lower this to
          # `low` (emit-all), then ratchet back to `high`.
          fail-on-severity: high
          # ALLOW-list: exhaustive set of permissive licenses present in the
          # tree (verified with `license-checker`). Any *detected* license not
          # here fails the PR — so copyleft/commercial introductions (GPL,
          # AGPL, LGPL, MPL, EPL, SSPL, BUSL, Elastic, …) are blocked by
          # omission, with no enumerate-every-bad-id maintenance.
          # Dual licenses like `(MIT OR GPL-3.0-or-later)`, `(MIT OR CC0-1.0)`,
          # `(BSD-2-Clause OR MIT OR Apache-2.0)` stay GREEN — the OR is
          # satisfied by an allowed member. Refresh this list when a new
          # permissive dep is introduced (the PR adding it will flag it here).
          allow-licenses: >-
            MIT, Apache-2.0, ISC,
            BSD-2-Clause, BSD-3-Clause, 0BSD,
            BlueOak-1.0.0, Python-2.0,
            CC0-1.0, CC-BY-4.0, Unlicense
          # allow-dependencies-licenses carries exactly ONE documented entry: the
          # SonarQube LGPL exception (#150/#161). SonarSource/sonarqube-scan-action
          # is LGPL-3.0 — copyleft, NOT on the permissive allow-list above — but a
          # CI-ONLY action we invoke, never linked/redistributed into repo output,
          # so its copyleft terms don't reach it (the same external-invocation
          # carve-out that clears shellcheck/ClamAV). This is a MAINTAINER-APPROVED
          # exception; see docs/SECURITY-TOOLING.md.
          # #161 Q1 (verified against the action's src/purl.ts `purlsMatch` at the
          # pinned SHA): exemptions match by NAME ONLY — `purlsMatch` compares
          # type + namespace/name and IGNORES the version. So the @<sha> below is
          # cosmetic; a future SHA/version bump does NOT re-trigger review, the
          # entry silences license checks for ALL versions of this action. That is
          # intended here (it's LGPL at every version, permanently exempt while used).
          # nosemgrep (maintainer-approved, same proven false positive as the
          # sonarqube job's pins): the exemption purl carries the action's
          # 40-char commit SHA, tripping the "sonar…<40-hex>" secrets heuristic.
          # NOTE: a plain quoted scalar (not a `>-` block) so the trailing
          # `# nosemgrep` is a real YAML comment — inside a block scalar it would
          # be literal text and corrupt the purl (breaking the exemption).
          allow-dependencies-licenses: 'pkg:githubactions/SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e' # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
          # Aside from that one entry, allow-dependencies-licenses stays empty for
          # the license-UNKNOWN path: "Could not detect a license" on a brand-new
          # release is upstream harvest lag (GitHub sources PyPI license data from
          # ClearlyDefined) and is self-expiring — this action is PR-diff-scoped,
          # so the warning only fires on PRs touching that package. Because
          # exemptions are name-only (above), a standing entry would silence
          # license checks for ALL future versions; so instead route each UNKNOWN
          # to a `license-review` issue per #127 and the procedure in
          # docs/SECURITY-TOOLING.md ("Could not detect a license") — the triage
          # step below (#127 Leg B1) automates that routing.

      # ── License-UNKNOWN triage (#127 Leg B1) ──────────────────────────
      # The action's `invalid-license-changes` output is JSON with buckets
      # `unlicensed` / `unresolved` / `forbidden`. For each `unlicensed`
      # pypi purl this step (a) fire-and-forgets a ClearlyDefined harvest
      # POST to shorten the lag, and (b) files/updates an idempotent
      # `license-review` issue — the durable artifact the scheduled
      # license-review-poller workflow later resolves (auto-close on an
      # acceptable declared license; red run + escalation otherwise).
      # This step NEVER fails the job: on a read-only token (fork PRs) or
      # API hiccups it degrades to warnings. Non-pypi ecosystems are
      # log-only (npm licenses come from the registry, not ClearlyDefined).
      # `!cancelled()`: run even when the review step fails the gate —
      # outputs are set before the action's own failure.
      - name: License-UNKNOWN triage (file license-review issues)
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          # Untrusted-ish JSON (manifest-controlled names) — env, never
          # inline interpolation into the script.
          INVALID_LICENSE_CHANGES: ${{ steps.review.outputs.invalid-license-changes }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$INVALID_LICENSE_CHANGES" ]; then
            echo "No invalid-license-changes output (review step skipped or failed early) — nothing to triage."
            exit 0
          fi
          if ! unlicensed=$(jq -c '.unlicensed // []' <<<"$INVALID_LICENSE_CHANGES"); then
            echo "::warning::could not parse invalid-license-changes output — skipping triage"
            exit 0
          fi
          count=$(jq 'length' <<<"$unlicensed")
          echo "unlicensed changes: $count"
          if [ "$count" = "0" ]; then exit 0; fi
          # mapfile, not a pipe-fed while-read: gh/curl inside the loop must
          # not be able to consume the loop's stdin.
          mapfile -t purls < <(jq -r '.[].package_url' <<<"$unlicensed" | sort -u)
          for purl in "${purls[@]}"; do
            # Treat the purl as untrusted: strict validation before any use.
            if ! printf '%s' "$purl" | grep -Eq '^pkg:pypi/[A-Za-z0-9._-]+@[A-Za-z0-9._+!-]+$'; then
              echo "::notice::non-pypi or malformed purl — manual triage: $purl"
              continue
            fi
            rest="${purl#pkg:pypi/}"
            name="${rest%@*}"
            version="${rest#*@}"
            # (a) Fire-and-forget ClearlyDefined harvest (assertion-free,
            # unauthenticated; their own tooling re-scans the artifact).
            if curl -sf -X POST https://api.clearlydefined.io/harvest \
                 -H 'Content-Type: application/json' \
                 -d "{\"tool\":\"package\",\"coordinates\":\"pypi/pypi/-/${name}/${version}\"}" > /dev/null; then
              echo "harvest queued: pypi/pypi/-/${name}/${version}"
            else
              echo "::warning::ClearlyDefined harvest POST failed for $purl (non-fatal)"
            fi
            # (b) Create-or-update the license-review issue (idempotent by
            # exact title match; titles are matched via jq --arg, never
            # interpolated into a query).
            title="license-review: $purl"
            existing=$(gh issue list --label license-review --state open \
              --json number,title --limit 100 \
              | jq -r --arg t "$title" '[.[] | select(.title == $t)][0].number // empty') || existing=""
            if [ -n "$existing" ]; then
              gh issue comment "$existing" \
                --body "Seen again on PR #${PR_NUMBER} ($(date -u +%Y-%m-%d)) — license still undetected upstream; harvest re-queued." \
                || echo "::warning::could not comment on issue #$existing (read-only token?) — $purl"
            else
              body="Dependency entered the tree with an undetected license (\`unlicensed\` bucket of dependency-review's \`invalid-license-changes\` output) on PR #${PR_NUMBER}.

          - **purl:** \`${purl}\`
          - **ClearlyDefined definition:** https://api.clearlydefined.io/definitions/pypi/pypi/-/${name}/${version} ([UI](https://clearlydefined.io/definitions/pypi/pypi/-/${name}/${version}))
          - A harvest request was POSTed to ClearlyDefined by CI.

          **Manual METADATA verification (primary source):** read the wheel/sdist \`METADATA\` \`License:\` / \`License-Expression:\` field on PyPI for \`${name}==${version}\` — stronger evidence than any aggregator.

          **Close condition:** the scheduled \`license-review-poller\` workflow auto-closes this issue once ClearlyDefined reports a declared license satisfiable from the \`allow-licenses\` list in \`security.yml\`; an unacceptable declared license escalates it instead (see #127 Leg B)."
              gh issue create --title "$title" --label license-review --body "$body" \
                || echo "::warning::could not create license-review issue (read-only token?) — manual follow-up: $purl"
            fi
          done

  grype:
    name: Grype FS scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # The anchore action emits SARIF and (with fail-build) sets the outcome;
      # capture its output path and always upload.
      - id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: '.'
          fail-build: true
          severity-cutoff: high
          output-format: sarif
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: grype-sarif
          path: ${{ steps.grype.outputs.sarif }}
          if-no-files-found: warn

  # ── Third-party container image (MiniStack emulator) ───────────────────
  # The MiniStack image runs with the host Docker socket mounted and
  # --network host (see ci.yml), which the threat model flags as untrusted
  # input. The Grype "FS scan" job above only scans the repo source (path '.'),
  # so nothing inspects the contents of the image itself. This job scans the
  # image BY ITS PINNED DIGEST so a newly-disclosed CVE in the emulator is
  # surfaced even though we can't patch a third-party image.
  #
  # Failure policy: HARD-FAIL, VEX-gated (#84). The image is third-party and
  # pinned by digest — we can't patch CVEs inside it — but a naive hard-fail
  # would be permanently red on ~50 unfixable base-image high+ CVEs. Instead
  # every accepted CVE is recorded as an individual, honest OpenVEX
  # `status: not_affected` record under `.vex/` (one file per CVE), which Grype
  # consumes via `GRYPE_VEX_DOCUMENTS` (a comma-separated list) and moves to the
  # ignored set. The gate then fails ONLY on a NEW high+ CVE not yet covered by
  # a `.vex/` record — the actionable signal (VEX-accept it or bump the digest).
  #
  # WHY not_affected (not affected): Grype's OpenVEX only suppresses
  # `not_affected`/`fixed` (grype/vex/openvex/implementation.go `FilterMatches`);
  # `affected` AUGMENTS (re-surfaces) matches — proven in PR #160. The
  # `not_affected` justification is `vulnerable_code_cannot_be_controlled_by_adversary`
  # — a genuine adversary-reachability claim for this local-only, loopback-bound,
  # ephemeral CI emulator (see each `.vex/` record's impact_statement + docs).
  #
  # Keeps the produce → always-upload → ENFORCE shape: `fail-build: false` so
  # the action never fails the step itself (the SARIF must always upload); the
  # step's own outcome is captured and enforced in the final `if: always()` step.
  ministack-image:
    name: Grype MiniStack image scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Grype's `--vex` takes individual files, not a directory, and the
      # scan-action `vex` input only forwards ONE path — so gather the image
      # CVE records (`.vex/CVE-*.openvex.json`) into the comma-separated list
      # Grype's GRYPE_VEX_DOCUMENTS env accepts (verified: comma works, space
      # does not). The `ecdsa` record is excluded (it targets a pypi purl on a
      # different surface, not the image) — matching trivy.yaml's `vulnerability.vex`.
      - name: Gather VEX documents
        id: vex
        run: echo "docs=$(printf '%s,' .vex/CVE-*.openvex.json | sed 's/,$//')" >> "$GITHUB_OUTPUT"
      # NOTE: this digest MUST match the image pinned in ci.yml
      # (ministackorg/ministack:full@sha256:dd2cf4d...). Keep them in sync;
      # if ci.yml bumps the digest, bump it here too.
      - id: grype
        # continue-on-error so an UNCOVERED high+ finding fails the STEP (records
        # outcome=failure) WITHOUT stopping the job — the SARIF must still upload.
        # Enforcement is off the saved outcome (produce → always-upload → enforce).
        continue-on-error: true
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        env:
          # Grype reads its config from env too; feed the whole `.vex/` set.
          GRYPE_VEX_DOCUMENTS: ${{ steps.vex.outputs.docs }}
        with:
          image: 'ministackorg/ministack:full@sha256:dd2cf4d2e58a9ee6534a52f1edf06a720064c24b90ca28d42b1c57181b9b8815'
          # fail-build:true so the action calls core.setFailed (→ step outcome
          # `failure`) on any high+ CVE left after VEX; with `fail-build:false`
          # it only WARNS (outcome stays `success`) and the gate wouldn't fire.
          # Severity floor stays `high` (ratchets down to medium/low over time —
          # each step its own PR; see docs).
          fail-build: true
          severity-cutoff: high
          output-format: sarif
      # Capture the step's real outcome (success = no UNCOVERED high+ CVE, since
      # VEX-accepted ones are ignored). Passed via env, not inline interpolation,
      # per the repo's zizmor-clean / no-template-injection rule.
      - name: Record outcome
        if: always()
        env:
          GRYPE_OUTCOME: ${{ steps.grype.outcome }}
        run: echo "outcome=$GRYPE_OUTCOME" > grype-image.outcome
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-ministack-image
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: grype-ministack-image-sarif
          path: ${{ steps.grype.outputs.sarif }}
          if-no-files-found: warn
      - name: Enforce Grype image result (hard-fail on any uncovered high+ CVE)
        if: always()
        run: |
          source grype-image.outcome
          echo "grype ministack-image step outcome=$outcome (fails on any high+ CVE not covered by a .vex/ record)"
          test "$outcome" = "success"

  # ── Trivy (second vuln scanner, alongside Grype) ────────────────────────
  # Trivy (Aqua Security, Apache-2.0) runs as a second vuln scanner next to the
  # Grype jobs above. It is a deliberate DUAL-SCANNER overlap: Grype and Trivy
  # use DIFFERENT vulnerability databases, so they surface different CVEs on the
  # same target — running both widens coverage (on the pinned image the high+
  # sets diverge: 47 grype ∪ 27 trivy = 50 union). Trivy is also the intended
  # full-tree backstop for the license-UNKNOWN / rider gap that
  # dependency-review's list mode can't fail closed on (docs/SECURITY-TOOLING.md,
  # #77 scope).
  #
  # Failure policy is SPLIT (#84):
  #   * trivy-fs   — REPORT-ONLY (source tree; mirrors the report-only Grype FS
  #                  job's posture for filesystem scanning — no VEX, no flip).
  #   * trivy-image — HARD-FAIL, VEX-gated (mirrors the flipped Grype
  #                  `ministack-image` job): the same `.vex/` OpenVEX
  #                  `not_affected` records gate it via Trivy's `--vex`
  #                  (fed through the `TRIVY_VEX` env, a comma-separated file
  #                  list — Trivy's `--vex` takes files, not a directory).
  #
  # The Trivy vuln DB FLOATS by design (like Grype's DB) so newly-disclosed
  # CVEs are caught without a repo change; it is cached across runs via
  # actions/cache (rolling github.run_id key, mirroring the mutation/fuzz
  # caches in ci.yml) so runs don't re-download it every time. The trivy-action
  # is SHA-pinned; the floating DB is documented in docs/PINNING.md.
  #
  # Trivy auto-discovers the committed trivy.yaml (repo root); scan policy stays
  # in the workflow flags below, not in that file.
  #
  # Both jobs keep the produce → always-upload → ENFORCE shape: run the action
  # with `continue-on-error: true` (so a finding never fails the STEP and the
  # SARIF always uploads), persist the step's outcome to a `*.outcome` file,
  # always-upload SARIF (artifact + Security tab), then a final `if: always()`
  # step sources the outcome. trivy-fs only LOGS it (report-only); trivy-image
  # ENFORCES it (`test "$outcome" = "success"`).

  # trivy-fs — filesystem vuln scan of the repo source (Trivy analog of the
  # Grype FS job).
  trivy-fs:
    name: Trivy FS scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Cache the (floating) Trivy vuln DB across runs. Rolling run_id key so the
      # post-job save always persists a fresh DB; restore-keys prefix-matches the
      # most recent prior cache (same pattern as the mutation/fuzz caches).
      - name: Cache Trivy DB
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ${{ github.workspace }}/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: |
            trivy-db-
      - id: trivy
        name: Run Trivy FS (SARIF; report-only)
        continue-on-error: true # report-only: never fail the job on this step
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: '.'
          format: sarif
          output: trivy-fs.sarif
          cache-dir: ${{ github.workspace }}/.cache/trivy
      - name: Record outcome
        if: always()
        # Pass the (trusted, enum-valued) step outcome via env rather than inline
        # interpolation, per the repo's zizmor-clean / no-template-injection rule.
        env:
          TRIVY_OUTCOME: ${{ steps.trivy.outcome }}
        run: echo "outcome=$TRIVY_OUTCOME" > trivy-fs.outcome
      - name: Emit human-readable table (report artifact)
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: '.'
          format: table
          output: trivy-fs.txt
          cache-dir: ${{ github.workspace }}/.cache/trivy
          skip-setup-trivy: 'true' # DB already fetched by the SARIF step above
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
      - name: Upload Trivy FS reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-fs-reports
          path: |
            trivy-fs.sarif
            trivy-fs.txt
          if-no-files-found: warn
      - name: Report Trivy FS outcome (report-only — never fails)
        if: always()
        run: |
          # Report-only: LOG the outcome, do NOT fail the job. Only the IMAGE
          # jobs hard-fail (#84); the filesystem source scan stays report-only.
          source trivy-fs.outcome
          echo "trivy-fs step outcome=$outcome (report-only — not enforced)"

  # trivy-image — vuln scan of the pinned MiniStack emulator image by digest
  # (Trivy analog of the flipped Grype `ministack-image` job). HARD-FAIL,
  # VEX-gated (#84): the image is third-party and pinned by digest, so we can't
  # patch CVEs inside it — the ~50 unfixable base-image high+ CVEs are accepted
  # via the same `.vex/` OpenVEX `not_affected` records the Grype job uses.
  #
  # HOW VEX REACHES TRIVY: through the committed `trivy.yaml`'s `vulnerability.vex`
  # list, which Trivy auto-discovers from the CWD. The trivy-action (v0.36.0) has
  # NO `vex` input and does NOT forward a `TRIVY_VEX` env to Trivy's `--vex` flag
  # (verified against its entrypoint — it runs `trivy <type> <ref>` with no extra
  # flags), so the env route silently loaded ZERO VEX docs and the gate wrongly
  # fired; the `trivy.yaml` route is what actually loads them. See trivy.yaml.
  #
  # SEVERITY + EXIT via the action's INPUTS (not env): the action UNSETS
  # TRIVY_SEVERITY for SARIF output unless `limit-severities-for-sarif: true`, so
  # severity/exit-code are passed as `severity`/`exit-code` inputs with
  # `limit-severities-for-sarif: true` to keep the HIGH,CRITICAL floor. `exit-code:
  # 1` fails Trivy on any UNCOVERED high+ CVE; `continue-on-error: true` keeps that
  # off the STEP so the SARIF always uploads, and the final `if: always()` step
  # enforces the saved outcome (produce → always-upload → enforce).
  trivy-image:
    name: Trivy MiniStack image scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Cache Trivy DB
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ${{ github.workspace }}/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: |
            trivy-db-
      # VEX comes from the committed trivy.yaml (auto-discovered), NOT a flag/env.
      # NOTE: this digest MUST match the image pinned in ci.yml and the Grype
      # ministack-image job above (ministackorg/ministack:full@sha256:dd2cf4d...).
      # Keep all three in sync; if ci.yml bumps the digest, bump it here too.
      - id: trivy
        name: Run Trivy image (SARIF; hard-fail, VEX-gated)
        continue-on-error: true # keep failure OFF the step so SARIF always uploads; enforced below
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: 'ministackorg/ministack:full@sha256:dd2cf4d2e58a9ee6534a52f1edf06a720064c24b90ca28d42b1c57181b9b8815'
          format: sarif
          output: trivy-image.sarif
          cache-dir: ${{ github.workspace }}/.cache/trivy
          # Severity floor + hard-fail via inputs; limit-severities-for-sarif keeps
          # the action from unsetting the severity filter on SARIF output.
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          limit-severities-for-sarif: 'true'
      - name: Record outcome
        if: always()
        # Pass the (trusted, enum-valued) step outcome via env rather than inline
        # interpolation, per the repo's zizmor-clean / no-template-injection rule.
        env:
          TRIVY_OUTCOME: ${{ steps.trivy.outcome }}
        run: echo "outcome=$TRIVY_OUTCOME" > trivy-image.outcome
      - name: Emit human-readable table (report artifact)
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: 'ministackorg/ministack:full@sha256:dd2cf4d2e58a9ee6534a52f1edf06a720064c24b90ca28d42b1c57181b9b8815'
          format: table
          output: trivy-image.txt
          cache-dir: ${{ github.workspace }}/.cache/trivy
          # Same severity floor so the table reflects the gated view; no exit-code
          # (display-only — enforcement is off the SARIF step's outcome). VEX is
          # auto-loaded from trivy.yaml. `table` isn't SARIF, so severity isn't unset.
          severity: 'HIGH,CRITICAL'
          skip-setup-trivy: 'true' # DB already fetched by the SARIF step above
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
      - name: Upload Trivy image reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-image-reports
          path: |
            trivy-image.sarif
            trivy-image.txt
          if-no-files-found: warn
      - name: Enforce Trivy image result (hard-fail on any uncovered high+ CVE)
        if: always()
        run: |
          # Hard-fail (VEX-gated): the scan step ran with exit-code 1 + TRIVY_VEX,
          # so its outcome is `failure` iff a HIGH,CRITICAL remains uncovered by a
          # .vex/ record. Mirrors the flipped Grype ministack-image enforce.
          source trivy-image.outcome
          echo "trivy-image step outcome=$outcome (fails on any high+ CVE not covered by a .vex/ record)"
          test "$outcome" = "success"

  # trivy-config (cdk.out misconfig scan) — DELIBERATELY OMITTED for #133.
  # Decision (recorded per acceptance criterion): DEFER as checkov-redundant
  # (YAGNI). The synthesized CloudFormation in cdk.out is already scanned by the
  # `iac` job (checkov + cfn-lint), which is the REQUIRED code-scanning gate in
  # the main-branch ruleset. Adding trivy config would duplicate that IaC
  # coverage for no new signal here. #133 scope is vuln scanning (FS + image);
  # add trivy-config later only if a concrete gap in checkov's CFN coverage is
  # identified. Recorded in docs/SECURITY-TOOLING.md.

  # ── Malware / virus scan (ClamAV) ───────────────────────────────────────
  # Signature-based scan of the working tree (#149). ClamAV (GPLv2) runs as an
  # EXTERNAL scanner — a Docker service container + apt `clamdscan` over
  # loopback TCP — never linked or redistributed into repo output, the same
  # carve-out that clears shellcheck (GPLv3). The `clamav/clamav` image runs
  # freshclam at startup, so the scan always uses CURRENT virus signatures
  # (the DB floats by design, like Trivy's/Grype's vuln DB; the image is pinned
  # by digest). clamdscan has no machine-readable output, so clamav-to-sarif.mjs
  # parses its text log into SARIF (every hit = level error / security-severity
  # 10.0). Hard-fail via produce → always-upload → enforce.
  clamav:
    name: ClamAV virus scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    services:
      clamav:
        image: clamav/clamav@sha256:6f4a9e7d616ffc8d1070200fe35ac860735fdd522161a1043f94856e6ee13c28
        ports:
          - 127.0.0.1:3310:3310
        # The image ships its own clamdcheck.sh HEALTHCHECK — use it (do NOT
        # override with a curl/wget cmd; the image lacks them). clamd only
        # reports healthy after freshclam has loaded the signature DB.
        options: >-
          --health-cmd "/usr/local/bin/clamdcheck.sh"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          npm-ci: 'false' # converter uses Node built-ins only; no deps needed
      - name: Wait for clamd (TCP 3310)
        run: timeout 300 bash -c 'until (echo > /dev/tcp/127.0.0.1/3310) 2>/dev/null; do sleep 5; done'
      - name: Install clamdscan client + point it at the service
        run: |
          sudo apt-get update || true
          sudo rm -f /var/lib/man-db/auto-update
          sudo apt-get install -y --no-install-recommends clamdscan
          sudo mkdir -p /etc/clamav
          cat << 'EOF' | sudo tee /etc/clamav/clamd.conf
          TCPSocket 3310
          TCPAddr 127.0.0.1
          EOF
          clamdscan --version
      - name: Run clamdscan (log; enforce after upload)
        run: |
          set +e
          clamdscan --verbose --log=clamdscan.txt --stream --fdpass --multiscan .
          echo "exit=$?" > clamav.outcome
      - name: Convert clamdscan log to SARIF
        if: always()
        run: node .github/scripts/clamav-to-sarif.mjs clamdscan.txt clamav.sarif
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: clamav.sarif
          category: clamav
      - name: Upload ClamAV reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clamav-reports
          path: |
            clamdscan.txt
            clamav.sarif
          if-no-files-found: warn
      - name: Enforce ClamAV result (hard-fail on any detection)
        if: always()
        run: |
          source clamav.outcome
          echo "clamdscan exit=$exit (non-zero = virus signature detected)"
          test "$exit" = "0"

  # ── SonarQube (code quality + security analysis) ─────────────────────────
  # SonarQube Community (#150) run fully credential-free against a service
  # container: self-generate a token via the first-boot admin API, scan, check
  # the quality gate. GOVERNANCE: the two SonarSource actions are LGPL-3.0 and
  # SonarQube is a single-vendor SonarSource product — a MAINTAINER-APPROVED
  # exception under the CI-only external-invocation carve-out (same as
  # shellcheck/ClamAV; the actions are invoked, never linked/redistributed).
  # The LGPL scan-action is exempted in the dependency-review gate via
  # allow-dependencies-licenses (#161). SARIF is derived by our own
  # sonar-to-sarif.mjs from the api/issues/search JSON — NOT okorach/sonar-tools,
  # which hard-requires GPL-2.0 Levenshtein (beyond the LGPL exception).
  # Failure policy is REPORT-ONLY (log the gate status, never fail — mirrors
  # trivy-fs), with a documented ratchet to enforce once the baseline is triaged.
  # See docs/SECURITY-TOOLING.md.
  sonarqube:
    name: SonarQube analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    services:
      sonarqube:
        # nosemgrep is a maintainer-approved suppression of a PROVEN false
        # positive: the generic secrets rule matches "sonar…<40-hex>", which the
        # image digest below (and the SHA-pinned SonarSource actions further
        # down) unavoidably are. These are PUBLIC, REQUIRED pins — not API keys.
        # Rule-scoped so real SonarQube keys are still caught elsewhere. See PR + docs/SECURITY-TOOLING.md.
        image: sonarqube:community@sha256:160bd2f6a3485bd09b655ef22dd63c02bd1fa7ba82aa5d9973fd010b8bcca0b3 # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
        ports:
          - 127.0.0.1:9000:9000
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: true
          SONAR_WEB_SYSTEMPASSCODE: passcode
        # NO --health-cmd, deliberately (same rule as MiniStack in AGENTS.md:
        # "do NOT gate on --health-cmd; POLL readiness in a step instead").
        # Why: a service-container health gate that never goes healthy makes
        # GitHub abort with "Failed to initialize container" and SKIP the job's
        # steps. SonarQube 26.7 has a ~5-min cold start (Elasticsearch + web +
        # CE), which RACES any fixed health-retry budget — and a health-cmd that
        # runs INSIDE the image depends on that image's tools (busybox vs GNU
        # grep/wget), which change across digest bumps. Both bit us on #162.
        # With no health-cmd, GitHub starts the container and proceeds straight
        # to the steps; the "Wait for SonarQube to report UP" step below gates
        # readiness using the RUNNER's curl+jq (version-independent) with a
        # generous budget.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # Sonar wants full history for new-code / blame
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          npm-ci: 'false' # converter uses Node built-ins only; no deps needed
      - name: Wait for SonarQube to report UP
        # SonarQube 26.7 cold start (ES + web + CE) is ~5 min, so poll generously
        # (90 × 5s = 7.5 min, within the job's 20-min timeout). Uses the runner's
        # curl+jq — no dependency on the image's internal tools.
        run: |
          for _ in $(seq 1 90); do
            status=$(curl -s http://localhost:9000/api/system/status | jq -r '.status // empty')
            echo "status=${status:-<no response yet>}"
            if [ "$status" = "UP" ]; then echo "SonarQube is UP"; exit 0; fi
            sleep 5
          done
          echo "::error::SonarQube did not reach UP in time"
          exit 1
      - name: Generate a scanner token (first-boot admin API)
        # SonarQube's documented first-boot admin/admin default for this
        # ephemeral, loopback-only container (analogous to MiniStack's test/test).
        # Passed via env — NOT a literal `-u admin:admin`, which the gitleaks
        # curl-auth-user rule flags; the env-var form is not a hardcoded secret.
        env:
          SONAR_BOOT_USER: admin
          SONAR_BOOT_PASS: admin
        run: |
          token=$(curl -s -u "$SONAR_BOOT_USER:$SONAR_BOOT_PASS" -X POST \
            "http://localhost:9000/api/user_tokens/generate?name=github-actions" | jq -r '.token')
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "::error::failed to generate SonarQube token"
            exit 1
          fi
          echo "::add-mask::$token"
          echo "SONAR_TOKEN=$token" >> "$GITHUB_ENV"
      - name: Create SonarQube project
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        run: |
          curl -s -X POST -H "Authorization: Bearer $SONAR_TOKEN" \
            "http://localhost:9000/api/projects/create?project=e2e-ministack&name=e2e-ministack" > /dev/null
      - name: Run SonarQube scan
        # nosemgrep (maintainer-approved, see the services block above): the
        # 40-char commit-SHA pin trips the "sonar…<40-hex>" secrets heuristic.
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0 # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
        env:
          SONAR_HOST_URL: http://localhost:9000
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=e2e-ministack
            -Dsonar.projectName=e2e-ministack
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,cdk.out/**,coverage/**,reports/**
      - name: Check quality gate (report-only)
        id: qg
        continue-on-error: true
        # nosemgrep (maintainer-approved, see the services block above): the
        # 40-char commit-SHA pin trips the "sonar…<40-hex>" secrets heuristic.
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0 # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
        timeout-minutes: 5
        env:
          SONAR_HOST_URL: http://localhost:9000
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
      # produce → always-upload → enforce (same shape as the grype/trivy jobs):
      # the fetch+convert runs with continue-on-error so its result never fails
      # the STEP (the SARIF/artifact still upload), the outcome is saved, and a
      # final if: always() step enforces it. HONEST semantics: a SARIF is only
      # ever written from a REAL scan result — `curl -sf` fails on any non-2xx,
      # so on server-down / scan-never-ran NO sonar.sarif exists (we do NOT
      # fabricate an empty one: an empty SARIF under category `sonarqube` would
      # tell Code Scanning "analysis ran, found nothing" and RESOLVE prior
      # sonarqube alerts). A genuine 0-issue scan does yield a real empty-results
      # SARIF — that is a true "nothing found".
      - name: Fetch issues JSON + derive SARIF
        id: sarif
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        run: |
          curl -sf -H "Authorization: Bearer $SONAR_TOKEN" \
            "http://localhost:9000/api/issues/search?componentKeys=e2e-ministack&ps=500&p=1" \
            > sonar-issues.json
          node .github/scripts/sonar-to-sarif.mjs sonar-issues.json sonar.sarif
      - name: Record outcome
        if: always()
        env:
          SARIF_OUTCOME: ${{ steps.sarif.outcome }}
        run: echo "outcome=$SARIF_OUTCOME" > sonar.outcome
      # Upload only when a real SARIF was produced (steps.sarif succeeded). On
      # failure there is no file and we must NOT upload — an absent/empty SARIF
      # would wrongly resolve prior alerts; the enforce step below fails the job.
      - name: Upload SARIF to Security tab
        if: ${{ steps.sarif.outcome == 'success' }}
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: sonar.sarif
          category: sonarqube
      - name: Upload SonarQube reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sonarqube-reports
          path: |
            sonar.sarif
            sonar-issues.json
          if-no-files-found: warn
      - name: Enforce SonarQube analysis ran (fail on a non-real scan)
        if: always()
        run: |
          # The analysis producing a SARIF is a REAL gate: if the scan/convert
          # failed (server never came up, API error), fail the job — do NOT let
          # a missing SARIF pass silently. Only the quality-GATE verdict below
          # is report-only, not the analysis itself.
          source sonar.outcome
          echo "sonar SARIF step outcome=$outcome"
          test "$outcome" = "success"
      - name: Report quality-gate status (report-only — never fails)
        if: always()
        env:
          QG_STATUS: ${{ steps.qg.outputs.quality-gate-status }}
        run: |
          # Report-only (mirrors trivy-fs): LOG the gate status, do NOT fail.
          # Ratchet: a follow-up flips this to `test "$QG_STATUS" = "PASSED"`.
          echo "SonarQube quality gate status: ${QG_STATUS:-unknown} (report-only — not enforced)"

  # ── Software Bill of Materials ──────────────────────────────────────────
  # Syft generates a CycloneDX SBOM of the dependency tree (#77). Unlike the
  # vuln scanners this is INFORMATIONAL — there is no enforce step; it just
  # produces and always-uploads the SBOM artifact (the "produce → upload"
  # half of the repo pattern, minus enforce). CycloneDX is the chosen format;
  # the SBOM is artifact-only for now (attach to releases later when a release
  # process exists). It also feeds Grype/Trivy, which can consume an SBOM for
  # consistent component coverage.
  sbom:
    name: SBOM (Syft / CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: '.'
          format: cyclonedx-json
          output-file: sbom.cdx.json
          # We upload the artifact ourselves (below) with the repo's standard
          # if: always() pattern, so disable the action's own release upload.
          upload-artifact: false
      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: warn

  # ── Secrets ─────────────────────────────────────────────────────────────
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # full history so all commits are scanned
          persist-credentials: false
      - name: Install gitleaks
        # Pinned v8.30.1 + SHA-256 verify (content pin, not just a tag).
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
      - name: Run gitleaks (SARIF; enforce after upload)
        run: |
          set +e
          ./gitleaks detect --no-banner --redact \
            --report-format sarif --report-path gitleaks.sarif
          echo "exit=$?" > gitleaks.outcome
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: warn
      - name: Enforce gitleaks result
        if: always()
        run: |
          source gitleaks.outcome
          test "$exit" = "0"

  # ── Infrastructure-as-code (synthesized CloudFormation) ─────────────────
  iac:
    name: IaC scan (cfn-lint + checkov)
    # Runs on EVERY event (no path-gate). checkov is a REQUIRED code-scanning
    # tool in the `main` branch ruleset, which expects a checkov result for each
    # PR's commits; a path-gate (previously issue #15) made checkov skip on
    # non-CDK PRs, leaving the ruleset's code_scanning rule waiting forever and
    # deadlocking the merge. Always running it produces the required result. The
    # `npm run synth` here duplicates ci.yml's synth on doc-only changes — an
    # accepted cost for an always-satisfiable required gate.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      # Pin the Python used to install the scanners so the hash-pinned
      # requirements file (resolved against 3.12) installs reproducibly.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Synthesize CloudFormation
        run: npm run synth
      - name: Install scanners
        # Content-pinned install: every dist is hash-verified against the
        # committed lockfile (--require-hashes), so a re-published PyPI artifact
        # is rejected. Pins live in scanner-requirements/iac.txt.
        # --no-deps: the lockfile is a complete closure, and overrides.txt forces
        # aiohttp past checkov's declared <3.14.0 cap (security fix), which pip's
        # resolver would otherwise reject as a conflict.
        run: pip install --require-hashes --no-deps -r .github/scanner-requirements/iac.txt
      - name: cfn-lint (text report; errors-only enforce after upload)
        # cfn-lint is a linter (not a vuln scanner) and its SARIF formatter
        # needs unbundled deps, so keep it as text. Only the two expected W
        # warnings here; fail on errors only.
        run: |
          set +e
          cfn-lint cdk.out/*.template.json > cfn-lint.txt 2>&1
          cat cfn-lint.txt
          cfn-lint cdk.out/*.template.json --non-zero-exit-code error
          echo "exit=$?" > cfn-lint.outcome
      - name: checkov (SARIF; enforce after upload)
        run: |
          set +e
          checkov -d cdk.out --framework cloudformation -o sarif --output-file-path . --compact
          echo "exit=$?" > checkov.outcome
          checkov -d cdk.out --framework cloudformation --compact # human-readable
      - name: Upload checkov SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results_sarif.sarif
          category: checkov
      - name: Upload IaC reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: iac-reports
          path: |
            cfn-lint.txt
            results_sarif.sarif
          if-no-files-found: warn
      - name: Enforce IaC results
        if: always()
        run: |
          source cfn-lint.outcome; cfn=$exit
          source checkov.outcome; ckv=$exit
          echo "cfn-lint exit=$cfn  checkov exit=$ckv"
          test "$cfn" = "0" && test "$ckv" = "0"

  # ── Threat model (design-time artifact) ─────────────────────────────────
  threat-model:
    name: Threat model
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Node-only job (no dependency install): the validation below just runs
      # `node -e` over the committed JSON, so skip `npm ci`.
      - uses: ./.github/actions/setup
        with:
          npm-ci: 'false'
      # threat-composer is a design-time authoring tool (no CI generator that
      # works without a real Bedrock account), so the gate is simply: the
      # committed model parses and carries the expected sections. Edit it in
      # the Threat Composer app / VS Code extension; expand as the stack grows.
      - name: Validate threat-model.tc.json
        run: |
          node -e '
            const tc = require("./threat-model.tc.json");
            const need = ["schema","applicationInfo","threats","mitigations","assumptions"];
            const missing = need.filter((k) => !(k in tc));
            if (missing.length) { console.error("Missing sections:", missing); process.exit(1); }
            if (!tc.threats.length) { console.error("No threats defined"); process.exit(1); }
            console.log("threat-model.tc.json OK:", tc.threats.length, "threats");
          '

  # ── GitHub Actions workflow hardening ───────────────────────────────────
  # actionlint (correctness: schema, shellcheck) and zizmor (security:
  # injection, unpinned actions, permissions) together lint the workflow files.
  actionlint:
    name: Actionlint (workflow correctness)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Run actionlint
        # Content-pinned: download the release tarball directly and verify its
        # SHA-256 (matches the OSV/gitleaks pattern) instead of piping a
        # download script fetched unpinned-by-hash from raw.githubusercontent.com.
        # Hash is the published actionlint_1.7.12_checksums.txt entry for
        # linux_amd64. actionlint also runs shellcheck on `run:` blocks.
        run: |
          curl -sSfL -o actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          chmod +x actionlint
          ./actionlint -color

  zizmor:
    name: Zizmor (Actions audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
