name: Security

on:
  push:
  pull_request:
  workflow_dispatch: # allow manual runs
  schedule:
    # Weekly run so newly-disclosed CVEs are caught even without a push.
    - cron: '0 6 * * 1'

# Least privilege by default; jobs opt into more where needed.
permissions:
  contents: read

jobs:
  # ── Static analysis of the TypeScript / CDK source ──────────────────────
  codeql:
    name: CodeQL (JS/TS)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: javascript-typescript
          # Pin the analyzer bundle so the CodeQL engine/queries are reproducible
          # (otherwise the action auto-updates to the latest bundle).
          tools: https://github.com/github/codeql-action/releases/download/codeql-bundle-v2.25.6/codeql-bundle.tar.gz
      # CodeQL uploads its own SARIF to the Security tab natively.
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Run Semgrep (always writes SARIF; enforce after upload)
        run: |
          pipx install semgrep==1.167.0 || pip install semgrep==1.167.0
          # --error sets a non-zero exit on findings; capture it so the report
          # still uploads, then enforce in a later step.
          set +e
          semgrep scan --config=auto --error --sarif --output semgrep.sarif \
            --exclude=node_modules --exclude=cdk.out
          echo "exit=$?" > semgrep.outcome
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: warn
      - name: Enforce Semgrep result
        if: always()
        run: |
          source semgrep.outcome
          test "$exit" = "0"

  # ── Dependency / supply-chain vulnerabilities ───────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.17.0'
      - run: npm ci
      - name: npm audit (JSON report; enforce after upload)
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit.json
          echo "exit=$?" > npm-audit.outcome
          npm audit --audit-level=high # human-readable in the log
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-audit-json
          path: npm-audit.json
          if-no-files-found: warn
      - name: Enforce audit result
        if: always()
        run: |
          source npm-audit.outcome
          test "$exit" = "0"

  osv-scanner:
    name: OSV Scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install OSV-Scanner
        # Pinned to v2.4.0 AND verified by SHA-256 so a re-tagged/tampered
        # release is rejected (content pin, not just a tag pin).
        run: |
          curl -sSfL -o osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64
          echo "15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0  osv-scanner" | sha256sum -c -
          chmod +x osv-scanner
      - name: Scan lockfile (SARIF; enforce after upload)
        run: |
          set +e
          ./osv-scanner scan --lockfile=package-lock.json --format sarif > osv.sarif
          echo "exit=$?" > osv.outcome
          ./osv-scanner scan --lockfile=package-lock.json # human-readable
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: osv.sarif
          category: osv-scanner
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: osv-sarif
          path: osv.sarif
          if-no-files-found: warn
      - name: Enforce OSV result
        if: always()
        run: |
          source osv.outcome
          test "$exit" = "0"

  grype:
    name: Grype FS scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # The anchore action emits SARIF and (with fail-build) sets the outcome;
      # capture its output path and always upload.
      - id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: '.'
          fail-build: true
          severity-cutoff: high
          output-format: sarif
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: grype-sarif
          path: ${{ steps.grype.outputs.sarif }}
          if-no-files-found: warn

  # ── Secrets ─────────────────────────────────────────────────────────────
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # full history so all commits are scanned
          persist-credentials: false
      - name: Install gitleaks
        # Pinned v8.30.1 + SHA-256 verify (content pin, not just a tag).
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
      - name: Run gitleaks (SARIF; enforce after upload)
        run: |
          set +e
          ./gitleaks detect --no-banner --redact \
            --report-format sarif --report-path gitleaks.sarif
          echo "exit=$?" > gitleaks.outcome
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: warn
      - name: Enforce gitleaks result
        if: always()
        run: |
          source gitleaks.outcome
          test "$exit" = "0"

  # ── Infrastructure-as-code (synthesized CloudFormation) ─────────────────
  iac:
    name: IaC scan (cfn-lint + checkov)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.17.0'
      - run: npm ci
      - name: Synthesize CloudFormation
        run: npm run synth
      - name: Install scanners
        run: |
          pipx install cfn-lint==1.51.5 || pip install cfn-lint==1.51.5
          pipx install checkov==3.3.0 || pip install checkov==3.3.0
      - name: cfn-lint (text report; errors-only enforce after upload)
        # cfn-lint is a linter (not a vuln scanner) and its SARIF formatter
        # needs unbundled deps, so keep it as text. Only the two expected W
        # warnings here; fail on errors only.
        run: |
          set +e
          cfn-lint cdk.out/*.template.json > cfn-lint.txt 2>&1
          cat cfn-lint.txt
          cfn-lint cdk.out/*.template.json --non-zero-exit-code error
          echo "exit=$?" > cfn-lint.outcome
      - name: checkov (SARIF; enforce after upload)
        run: |
          set +e
          checkov -d cdk.out --framework cloudformation -o sarif --output-file-path . --compact
          echo "exit=$?" > checkov.outcome
          checkov -d cdk.out --framework cloudformation --compact # human-readable
      - name: Upload checkov SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: results_sarif.sarif
          category: checkov
      - name: Upload IaC reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: iac-reports
          path: |
            cfn-lint.txt
            results_sarif.sarif
          if-no-files-found: warn
      - name: Enforce IaC results
        if: always()
        run: |
          source cfn-lint.outcome; cfn=$exit
          source checkov.outcome; ckv=$exit
          echo "cfn-lint exit=$cfn  checkov exit=$ckv"
          test "$cfn" = "0" && test "$ckv" = "0"

  # ── Threat model (design-time artifact) ─────────────────────────────────
  threat-model:
    name: Threat model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.17.0'
      # threat-composer is a design-time authoring tool (no CI generator that
      # works without a real Bedrock account), so the gate is simply: the
      # committed model parses and carries the expected sections. Edit it in
      # the Threat Composer app / VS Code extension; expand as the stack grows.
      - name: Validate threat-model.tc.json
        run: |
          node -e '
            const tc = require("./threat-model.tc.json");
            const need = ["schema","applicationInfo","threats","mitigations","assumptions"];
            const missing = need.filter((k) => !(k in tc));
            if (missing.length) { console.error("Missing sections:", missing); process.exit(1); }
            if (!tc.threats.length) { console.error("No threats defined"); process.exit(1); }
            console.log("threat-model.tc.json OK:", tc.threats.length, "threats");
          '

  # ── GitHub Actions workflow hardening ───────────────────────────────────
  # actionlint (correctness: schema, shellcheck) and zizmor (security:
  # injection, unpinned actions, permissions) together lint the workflow files.
  actionlint:
    name: Actionlint (workflow correctness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Run actionlint
        # Official install script pins the version; actionlint also runs
        # shellcheck on `run:` blocks.
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
          ./actionlint -color

  zizmor:
    name: Zizmor (Actions audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
