name: Security

on:
  push:
  pull_request:
  workflow_dispatch: # allow manual runs
  schedule:
    # Weekly run so newly-disclosed CVEs are caught even without a push.
    - cron: '0 6 * * 1'

# Least privilege by default; jobs opt into more where needed.
permissions:
  contents: read

# Cancel superseded runs for the same ref so rapid pushes don't pile up
# duplicate scanner runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Static analysis of the TypeScript / CDK source ──────────────────────
  codeql:
    name: CodeQL (JS/TS)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: javascript-typescript
          # Pin the analyzer bundle so the CodeQL engine/queries are reproducible
          # (otherwise the action auto-updates to the latest bundle).
          tools: https://github.com/github/codeql-action/releases/download/codeql-bundle-v2.25.6/codeql-bundle.tar.gz
      # CodeQL uploads its own SARIF to the Security tab natively.
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Pin the Python used to install Semgrep so the hash-pinned requirements
      # file (resolved against 3.12) installs reproducibly.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Run Semgrep (always writes SARIF; enforce after upload)
        run: |
          # Content-pinned install: every dist is hash-verified against the
          # committed lockfile (--require-hashes), so a re-published PyPI
          # artifact is rejected. Pin lives in scanner-requirements/semgrep/requirements.txt.
          pip install --require-hashes -r .github/scanner-requirements/semgrep/requirements.txt
          # --error sets a non-zero exit on findings; capture it so the report
          # still uploads, then enforce in a later step.
          set +e
          # TEMPORARY, rule-scoped --exclude-rule for the buggy
          # `detected-sonarqube-docs-api-key` (a PROVEN false positive: its regex
          # `(?i)sonar.{0,50}…[0-9a-f]{40}` matches this repo's SHA-pinned
          # SonarSource actions + the sonarqube image digest — public, required
          # pins, NOT API keys; #163). We EXCLUDE the rule rather than `# nosemgrep`
          # it inline because a suppressed finding still ships in the SARIF
          # (`suppressions:[{inSource}]`) and GitHub Code Scanning surfaces it —
          # reddening the "Semgrep OSS" check that ingests our uploaded SARIF.
          # --exclude-rule drops the rule ENTIRELY (0 results), clearing both the
          # gate and the Code Scanning alert. This is maintainer-approved and
          # TEMPORARY: REMOVE this flag once the upstream fix
          # (semgrep/semgrep-rules#3994) lands in r/all — tracked by #163
          # (and folded into the vendored ruleset under #79). Scoped to this ONE
          # rule, so every other secret/SAST rule still runs.
          semgrep scan --config=auto --error --sarif --output semgrep.sarif \
            --exclude=node_modules --exclude=cdk.out \
            --exclude-rule=generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
          echo "exit=$?" > semgrep.outcome
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: semgrep.sarif
          category: semgrep
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: warn
      - name: Enforce Semgrep result
        if: always()
        run: |
          source semgrep.outcome
          test "$exit" = "0"

  # ── Dependency / supply-chain vulnerabilities ───────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: npm audit (JSON report; enforce after upload)
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit.json
          echo "exit=$?" > npm-audit.outcome
          npm audit --audit-level=high # human-readable in the log
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-audit-json
          path: npm-audit.json
          if-no-files-found: warn
      - name: Enforce audit result
        if: always()
        run: |
          source npm-audit.outcome
          test "$exit" = "0"

  osv-scanner:
    name: OSV Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install OSV-Scanner
        # Pinned to v2.4.0 AND verified by SHA-256 so a re-tagged/tampered
        # release is rejected (content pin, not just a tag pin).
        run: |
          curl -sSfL -o osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64
          echo "15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0  osv-scanner" | sha256sum -c -
          chmod +x osv-scanner
      # npm surface — HARD-FAIL (unchanged). OSV-Scanner v2 form:
      # `scan source --lockfile=…` (the bare `scan --lockfile=` is deprecated).
      - name: Scan npm lockfile (SARIF; hard-fail, enforced after upload)
        run: |
          set +e
          ./osv-scanner scan source --lockfile=package-lock.json --format sarif > osv.sarif
          echo "exit=$?" > osv.outcome
          ./osv-scanner scan source --lockfile=package-lock.json # human-readable
      # pip surface — REPORT-ONLY (#226). The pinned pip requirement files were
      # relocated to `.github/scanner-requirements/<tool>/requirements.txt` so SCA
      # scanners recognize them by filename; point OSV at them so their findings
      # post to Code Scanning. REPORT-ONLY (its exit code is NOT enforced), mirroring
      # trivy-fs: OSV v2.4.0 has no OpenVEX channel (only osv-scanner.toml
      # `[[IgnoredVulns]]`, which we do NOT use — a per-ID ignore is the forbidden
      # blanket-suppress, not honest VEX), and the sanctioned VEX status for the
      # `mcp` CVEs is `affected` (#188), which by design suppresses in NO scanner.
      # Report-only keeps those findings VISIBLE (open Code-Scanning alerts) without
      # a false hard-fail. A single .vex/ ledger → per-scanner dialect (incl. an OSV
      # generator) is the durable fix tracked in #251.
      - name: Scan pip requirements (SARIF; report-only — never fails)
        if: always()
        run: |
          set +e
          ./osv-scanner scan source \
            --lockfile=.github/scanner-requirements/semgrep/requirements.txt \
            --lockfile=.github/scanner-requirements/iac/requirements.txt \
            --lockfile=.github/scanner-requirements/overrides/requirements.txt \
            --format sarif > osv-pip.sarif
          echo "pip osv exit=$? (report-only — not enforced)"
          ./osv-scanner scan source \
            --lockfile=.github/scanner-requirements/semgrep/requirements.txt \
            --lockfile=.github/scanner-requirements/iac/requirements.txt \
            --lockfile=.github/scanner-requirements/overrides/requirements.txt # human-readable
          true
      - name: Upload npm SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: osv.sarif
          category: osv-scanner
      - name: Upload pip SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: osv-pip.sarif
          category: osv-scanner-pip
      - name: Upload SARIF artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: osv-sarif
          path: |
            osv.sarif
            osv-pip.sarif
          if-no-files-found: warn
      - name: Enforce OSV result (npm surface only — pip is report-only)
        if: always()
        run: |
          source osv.outcome
          test "$exit" = "0"

  # PR-time dependency-diff gate (#77). Unlike the always-on scanners above,
  # this only runs on pull_request: it diffs the PR's dependency changes
  # against the GitHub Advisory DB and a license policy, blocking the PR
  # before a vulnerable or copyleft/non-FOSS dependency is ever merged.
  #
  # License policy = ALLOW-list. `deny-licenses` is deprecated and slated for
  # removal (upstream issue 997): a blocklist gives false security — it's easy
  # to miss a commercial/copyleft license you didn't enumerate (e.g. Elastic).
  # An allow-list fails CLOSED on any *detected* license not on the list, which
  # is the right posture for the repo's FOSS-only governance line (the same one
  # that rejected k6/AGPL in #73 and removed Renovate/AGPL). The list below is
  # the exhaustive set of permissive licenses actually present in the tree
  # (verified with `license-checker`); refresh it when a new permissive dep is
  # introduced. Trivy's license scan (separate job) is the full-tree backstop
  # for the *undetected*-license gap, which neither list mode fails closed on.
  # See docs/SECURITY-TOOLING.md.
  dependency-review:
    name: Dependency review (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # PR-only: the action needs the PR's base↔head dependency diff. It is a
    # no-op (and errors) on push/schedule/dispatch, so gate it to pull_request.
    if: github.event_name == 'pull_request'
    # pull-requests: write is required by comment-summary-in-pr (below), which
    # posts the full vuln+license review as a single (overwritten) PR comment.
    # issues: write is required by the license-UNKNOWN triage step (#127 Leg
    # B1), which files/updates `license-review` issues for unlicensed deps.
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - id: review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Post the full vuln + license review summary as a PR comment on
          # every run (not just failures) so the complete output is visible
          # without digging into job logs. Each run overwrites the prior one.
          comment-summary-in-pr: always
          # Align with the existing `npm audit --audit-level=high` posture.
          # To triage everything during a rollout, temporarily lower this to
          # `low` (emit-all), then ratchet back to `high`.
          fail-on-severity: high
          # ALLOW-list: exhaustive set of permissive licenses present in the
          # tree (verified with `license-checker`). Any *detected* license not
          # here fails the PR — so copyleft/commercial introductions (GPL,
          # AGPL, LGPL, MPL, EPL, SSPL, BUSL, Elastic, …) are blocked by
          # omission, with no enumerate-every-bad-id maintenance.
          # Dual licenses like `(MIT OR GPL-3.0-or-later)`, `(MIT OR CC0-1.0)`,
          # `(BSD-2-Clause OR MIT OR Apache-2.0)` stay GREEN — the OR is
          # satisfied by an allowed member. Refresh this list when a new
          # permissive dep is introduced (the PR adding it will flag it here).
          allow-licenses: >-
            MIT, Apache-2.0, ISC,
            BSD-2-Clause, BSD-3-Clause, 0BSD,
            BlueOak-1.0.0, Python-2.0,
            CC0-1.0, CC-BY-4.0, Unlicense
          # allow-dependencies-licenses carries exactly TWO documented entries: the
          # SonarQube LGPL exception (#150/#161) for BOTH SonarSource actions this
          # repo uses — sonarqube-scan-action AND sonarqube-quality-gate-action.
          # Both are LGPL-3.0 — copyleft, NOT on the permissive allow-list above —
          # but CI-ONLY actions we invoke, never linked/redistributed into repo
          # output, so their copyleft terms don't reach it (the same external-
          # invocation carve-out that clears shellcheck/ClamAV). MAINTAINER-APPROVED
          # exception; see docs/SECURITY-TOOLING.md. (Both must be listed: an
          # exemption for only one leaves the other in dependency-review's
          # `unlicensed` bucket, where the #127 Leg B1 pypi-only triage step emits
          # a "non-pypi purl — manual triage" NOTICE. Listing both silences it.)
          # #161 Q1 (verified against the action's src/purl.ts `purlsMatch` at the
          # pinned SHA): exemptions match by NAME ONLY — `purlsMatch` compares
          # type + namespace/name and IGNORES the version. So the @<sha>s below are
          # cosmetic; a future SHA/version bump does NOT re-trigger review, the
          # entries silence license checks for ALL versions of these actions. That
          # is intended here (they're LGPL at every version, permanently exempt).
          # NOTE: a plain quoted scalar (not a `>-` block) so the two purls parse
          # as a single clean comma-list (a block scalar would fold in stray
          # text). The detected-sonarqube-docs-api-key secrets rule would match
          # these SHA-bearing purls, but it is globally --exclude-rule'd in the
          # semgrep job (temporary; see #163) so no inline suppression is needed.
          allow-dependencies-licenses: 'pkg:githubactions/SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e, pkg:githubactions/SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b'
          # Aside from that one entry, allow-dependencies-licenses stays empty for
          # the license-UNKNOWN path: "Could not detect a license" on a brand-new
          # release is upstream harvest lag (GitHub sources PyPI license data from
          # ClearlyDefined) and is self-expiring — this action is PR-diff-scoped,
          # so the warning only fires on PRs touching that package. Because
          # exemptions are name-only (above), a standing entry would silence
          # license checks for ALL future versions; so instead route each UNKNOWN
          # to a `license-review` issue per #127 and the procedure in
          # docs/SECURITY-TOOLING.md ("Could not detect a license") — the triage
          # step below (#127 Leg B1) automates that routing.

      # ── License-UNKNOWN triage (#127 Leg B1) ──────────────────────────
      # The action's `invalid-license-changes` output is JSON with buckets
      # `unlicensed` / `unresolved` / `forbidden`. For each `unlicensed`
      # pypi purl this step (a) fire-and-forgets a ClearlyDefined harvest
      # POST to shorten the lag, and (b) files/updates an idempotent
      # `license-review` issue — the durable artifact the scheduled
      # license-review-poller workflow later resolves (auto-close on an
      # acceptable declared license; red run + escalation otherwise).
      # This step NEVER fails the job: on a read-only token (fork PRs) or
      # API hiccups it degrades to warnings. Non-pypi ecosystems are
      # log-only (npm licenses come from the registry, not ClearlyDefined).
      # `!cancelled()`: run even when the review step fails the gate —
      # outputs are set before the action's own failure.
      - name: License-UNKNOWN triage (file license-review issues)
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          # Untrusted-ish JSON (manifest-controlled names) — env, never
          # inline interpolation into the script.
          INVALID_LICENSE_CHANGES: ${{ steps.review.outputs.invalid-license-changes }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$INVALID_LICENSE_CHANGES" ]; then
            echo "No invalid-license-changes output (review step skipped or failed early) — nothing to triage."
            exit 0
          fi
          if ! unlicensed=$(jq -c '.unlicensed // []' <<<"$INVALID_LICENSE_CHANGES"); then
            echo "::warning::could not parse invalid-license-changes output — skipping triage"
            exit 0
          fi
          count=$(jq 'length' <<<"$unlicensed")
          echo "unlicensed changes: $count"
          if [ "$count" = "0" ]; then exit 0; fi
          # mapfile, not a pipe-fed while-read: gh/curl inside the loop must
          # not be able to consume the loop's stdin.
          mapfile -t purls < <(jq -r '.[].package_url' <<<"$unlicensed" | sort -u)
          for purl in "${purls[@]}"; do
            # Treat the purl as untrusted: strict validation before any use.
            if ! printf '%s' "$purl" | grep -Eq '^pkg:pypi/[A-Za-z0-9._-]+@[A-Za-z0-9._+!-]+$'; then
              echo "::notice::non-pypi or malformed purl — manual triage: $purl"
              continue
            fi
            rest="${purl#pkg:pypi/}"
            name="${rest%@*}"
            version="${rest#*@}"
            # (a) Fire-and-forget ClearlyDefined harvest (assertion-free,
            # unauthenticated; their own tooling re-scans the artifact).
            if curl -sf -X POST https://api.clearlydefined.io/harvest \
                 -H 'Content-Type: application/json' \
                 -d "{\"tool\":\"package\",\"coordinates\":\"pypi/pypi/-/${name}/${version}\"}" > /dev/null; then
              echo "harvest queued: pypi/pypi/-/${name}/${version}"
            else
              echo "::warning::ClearlyDefined harvest POST failed for $purl (non-fatal)"
            fi
            # (b) Create-or-update the license-review issue (idempotent by
            # exact title match; titles are matched via jq --arg, never
            # interpolated into a query).
            title="license-review: $purl"
            existing=$(gh issue list --label license-review --state open \
              --json number,title --limit 100 \
              | jq -r --arg t "$title" '[.[] | select(.title == $t)][0].number // empty') || existing=""
            if [ -n "$existing" ]; then
              gh issue comment "$existing" \
                --body "Seen again on PR #${PR_NUMBER} ($(date -u +%Y-%m-%d)) — license still undetected upstream; harvest re-queued." \
                || echo "::warning::could not comment on issue #$existing (read-only token?) — $purl"
            else
              body="Dependency entered the tree with an undetected license (\`unlicensed\` bucket of dependency-review's \`invalid-license-changes\` output) on PR #${PR_NUMBER}.

          - **purl:** \`${purl}\`
          - **ClearlyDefined definition:** https://api.clearlydefined.io/definitions/pypi/pypi/-/${name}/${version} ([UI](https://clearlydefined.io/definitions/pypi/pypi/-/${name}/${version}))
          - A harvest request was POSTed to ClearlyDefined by CI.

          **Manual METADATA verification (primary source):** read the wheel/sdist \`METADATA\` \`License:\` / \`License-Expression:\` field on PyPI for \`${name}==${version}\` — stronger evidence than any aggregator.

          **Close condition:** the scheduled \`license-review-poller\` workflow auto-closes this issue once ClearlyDefined reports a declared license satisfiable from the \`allow-licenses\` list in \`security.yml\`; an unacceptable declared license escalates it instead (see #127 Leg B)."
              gh issue create --title "$title" --label license-review --body "$body" \
                || echo "::warning::could not create license-review issue (read-only token?) — manual follow-up: $purl"
            fi
          done

  grype:
    name: Grype FS scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # VEX-aware FS gate (#226, #284). Feed the whole `.vex/` set via
      # GRYPE_VEX_DOCUMENTS (comma-separated — the same channel the ministack-image
      # job uses) so an honest `not_affected` record suppresses a matching
      # filesystem finding. go-vex only suppresses when the record's product purl
      # equals the scanned component's, so the image `CVE-*` records (deb/generic
      # image purls) are INERT here while the pypi-surface records
      # (e.g. ecdsa-CVE-2024-23342, a pypi purl in a relocated requirements.txt)
      # match and drop.
      - name: Gather VEX documents
        id: vex
        run: echo "docs=$(printf '%s,' .vex/*.openvex.json | sed 's/,$//')" >> "$GITHUB_OUTPUT"
      # ── The GATE — derive the fail decision from the JSON, NOT from grype's
      # `fail-build` (#284), mirroring the ministack-image job. WHY: grype only
      # moves `not_affected`/`fixed` records to `ignoredMatches[]`; an `affected`
      # record STAYS in `matches[]` (its `AugmentMatches` re-surfaces it — proven
      # in #160). So once grype's floating DB began rating the 3 mcp GHSAs high,
      # the deliberately-`affected` `.vex/mcp-CVE-*.openvex.json` records (#188
      # status-honesty: reachable-but-not-exercised MCP server transport) could
      # not suppress the finding and this REQUIRED gate reddened on main + every
      # PR. The JSON-derived gate (`grype-fs-gate.mjs`) fails ONLY on a finding
      # NOT covered by ANY `.vex/` record — an `affected` record is an explicit,
      # reviewed acceptance exactly as a `not_affected` one is — so it still
      # hard-fails on a genuinely-new uncovered finding (the actionable signal)
      # but no longer reds on VEX-accepted CVEs. The mcp records stay honestly
      # `affected`; the SARIF still uploads so findings stay VISIBLE.
      #
      # STRICTEST FLOOR (#284 maintainer directive "drop it the most strict"):
      # the gate floor is grype's LOWEST rung — EVERY severity counts
      # (negligible/low/medium/high/critical), not just high+. The floor lives in
      # the JSON gate (`grype-fs-gate.ts`), NOT in `severity-cutoff`: proven
      # empirically that grype's `severity-cutoff` only sets the process EXIT CODE
      # and does NOT filter the JSON `matches[]` or the SARIF results (a Medium
      # finding is present at cutoff=high just as at cutoff=negligible). Since the
      # gate reads `fail-build: false` and derives the verdict from the JSON, the
      # TS floor is authoritative; `severity-cutoff: negligible` is set on both
      # steps to make intent explicit and keep the exit code consistent.
      # `fail-build: false` so the action never fails the step itself (the SARIF
      # must always upload); the gate is enforced off the outcome file below.
      #
      # A separate JSON scan feeds the gate (`grype-fs-gate.mjs` needs the
      # structured `matches[].vulnerability.{id,severity}` + `relatedVulnerabilities`
      # for GHSA↔CVE aliasing that SARIF doesn't carry cleanly); the SARIF scan
      # below is the Security-tab visibility view (VEX-fed, unchanged shape).
      - id: grype-json
        name: Grype gate scan (VEX-fed JSON)
        continue-on-error: true # never stop the job here; enforced off the outcome below
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        env:
          GRYPE_VEX_DOCUMENTS: ${{ steps.vex.outputs.docs }}
        with:
          # Pin the grype ENGINE (#183): the action SHA alone leaves grype
          # floating to "latest at runtime", so local↔CI (and run↔run) diverge.
          # The vuln DB still floats by design (fresh CVEs). Bump deliberately.
          grype-version: v0.114.0
          path: '.'
          fail-build: false # gate is derived from the JSON below, not fail-build
          severity-cutoff: negligible # strictest floor (#284); the TS gate is authoritative
          output-format: json
      # Compute the gate from the JSON: FAIL iff a finding AT ANY SEVERITY is NOT
      # covered by ANY `.vex/` record (affected OR not_affected — both are reviewed
      # acceptances). Handles GHSA↔CVE aliasing (grype may report the GHSA with the
      # CVE in `relatedVulnerabilities`, or vice versa; the `.vex/` records name the
      # CVE + alias the GHSA). Logic is the 100%-covered + mutation-tested + fuzzed
      # `grype-fs-gate.ts`; the `.mjs` is a thin CLI shim (Node built-in only).
      - name: Derive gate outcome from JSON (VEX-aware, both statuses)
        if: always()
        env:
          GATE_JSON: ${{ steps.grype-json.outputs.json }}
        run: |
          if [ -z "$GATE_JSON" ] || [ ! -f "$GATE_JSON" ]; then
            echo "no gate JSON produced (scan failed to run)"
            echo "outcome=failure" > grype-fs.outcome
            exit 0
          fi
          # shellcheck disable=SC2046  # intentional glob-expansion of the .vex/ set
          node .github/scripts/grype-fs-gate.mjs "$GATE_JSON" $(printf '%s ' .vex/*.openvex.json)
      # The Security-tab visibility view: a VEX-fed SARIF (fail-build:false so it
      # never fails the step). VEX-fed keeps parity with the pre-#284 Security-tab
      # behavior (a `not_affected` FS record like ecdsa is suppressed here; an
      # `affected` mcp record still SHOWS — honest visibility, just no longer
      # gate-failing).
      - id: grype
        name: Grype SARIF scan (Security-tab view, VEX-fed)
        continue-on-error: true # visibility path; the gate is the JSON scan above
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        env:
          GRYPE_VEX_DOCUMENTS: ${{ steps.vex.outputs.docs }}
        with:
          grype-version: v0.114.0
          path: '.'
          fail-build: false # visibility only; gate is derived from the JSON above
          severity-cutoff: negligible # strictest floor (#284) — surface every severity
          output-format: sarif
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: grype-sarif
          path: |
            ${{ steps.grype.outputs.sarif }}
            ${{ steps.grype-json.outputs.json }}
          if-no-files-found: warn
      - name: Enforce Grype FS result (hard-fail on any uncovered CVE, any severity)
        if: always()
        run: |
          source grype-fs.outcome
          echo "grype FS scan outcome=$outcome (fails on any CVE, at any severity, not covered by a .vex/ record)"
          test "$outcome" = "success"

  # ── Third-party container image (MiniStack emulator) ───────────────────
  # The MiniStack image runs with the host Docker socket mounted and
  # --network host (see ci.yml), which the threat model flags as untrusted
  # input. The Grype "FS scan" job above only scans the repo source (path '.'),
  # so nothing inspects the contents of the image itself. This job scans the
  # image BY ITS PINNED DIGEST so a newly-disclosed CVE in the emulator is
  # surfaced even though we can't patch a third-party image.
  #
  # Failure policy: HARD-FAIL, VEX-gated (#84). The image is third-party and
  # pinned by digest — we can't patch CVEs inside it — but a naive hard-fail
  # would be permanently red on ~50 unfixable base-image high+ CVEs. Instead
  # every accepted CVE is recorded as an individual, honest OpenVEX
  # `status: not_affected` record under `.vex/` (one file per CVE), which Grype
  # consumes via `GRYPE_VEX_DOCUMENTS` (a comma-separated list) and moves to the
  # ignored set. The gate then fails ONLY on a NEW high+ CVE not yet covered by
  # a `.vex/` record — the actionable signal (VEX-accept it or bump the digest).
  #
  # WHY not_affected (not affected): Grype's OpenVEX only suppresses
  # `not_affected`/`fixed` (grype/vex/openvex/implementation.go `FilterMatches`);
  # `affected` AUGMENTS (re-surfaces) matches — proven in PR #160. The
  # `not_affected` justification is `vulnerable_code_cannot_be_controlled_by_adversary`
  # — a genuine adversary-reachability claim for this local-only, loopback-bound,
  # ephemeral CI emulator (see each `.vex/` record's impact_statement + docs).
  #
  # Keeps the produce → always-upload → ENFORCE shape: `fail-build: false` so
  # the action never fails the step itself (the SARIF must always upload); the
  # step's own outcome is captured and enforced in the final `if: always()` step.
  ministack-image:
    name: Grype MiniStack image scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Grype's `--vex` takes individual files, not a directory, and the
      # scan-action `vex` input only forwards ONE path — so gather the image
      # CVE records (`.vex/CVE-*.openvex.json`) into the comma-separated list
      # Grype's GRYPE_VEX_DOCUMENTS env accepts (verified: comma works, space
      # does not). The `ecdsa` record is excluded (it targets a pypi purl on a
      # different surface, not the image) — matching trivy.yaml's `vulnerability.vex`.
      - name: Gather VEX documents
        id: vex
        run: echo "docs=$(printf '%s,' .vex/CVE-*.openvex.json | sed 's/,$//')" >> "$GITHUB_OUTPUT"
      # SCAN ONCE (#263): the image is ANALYZED once — Syft builds an SBOM of the
      # pinned digest — and every grype pass below scans that SBOM (`sbom:` input),
      # a cheap DB match, instead of re-pulling/unpacking the image 3x. Verified:
      # `grype sbom:` yields the IDENTICAL high+ set as `grype <image>` on this
      # digest (43 high+, exact match), and GRYPE_VEX_DOCUMENTS suppresses on the
      # SBOM the same way — so the gate is unchanged.
      # NOTE: this digest MUST match the image pinned in ci.yml
      # (ministackorg/ministack:full@sha256:636c4ef5...). Keep them in sync.
      - name: Build image SBOM (once)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: 'ministackorg/ministack:full@sha256:636c4ef52bff20e29f161d24e895359b2927f72a143d726792faa86160043ca9'
          format: syft-json
          output-file: image.sbom.json
          upload-artifact: false
      # ── The GATE (VEX-fed) — derive the fail decision from the JSON, NOT from
      # grype's `fail-build` (#261). fail-build:true made grype print a FALSE
      # "Failed minimum severity level" warning reporting the PRE-VEX findings
      # even though the gate passed; we drop it and instead read the VEX-fed JSON,
      # where every VEX-covered CVE moves to `ignoredMatches[]` and `matches[]`
      # holds ONLY genuinely-uncovered findings (verified: 53 → ignoredMatches,
      # 0 → matches). The gate fails iff `matches[]` has a high+ entry.
      - id: grype
        name: Grype gate scan (VEX-fed JSON, from the SBOM)
        continue-on-error: true # never stop the job here; enforced off the outcome below
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        env:
          GRYPE_VEX_DOCUMENTS: ${{ steps.vex.outputs.docs }}
        with:
          # Pin the grype ENGINE (#183) — action SHA alone floats grype to latest.
          grype-version: v0.114.0
          sbom: image.sbom.json
          fail-build: false # gate is derived from the JSON below, not fail-build
          severity-cutoff: high
          output-format: json
      # Compute the gate from the VEX-fed JSON: fail iff any high+/critical remains
      # in `matches[]` (i.e. NOT covered by a `.vex/` record). VEX-covered CVEs are
      # in `ignoredMatches[]` and correctly don't count. Node built-in only.
      - name: Derive gate outcome from VEX-fed JSON
        if: always()
        env:
          GATE_JSON: ${{ steps.grype.outputs.json }}
        run: |
          if [ -z "$GATE_JSON" ] || [ ! -f "$GATE_JSON" ]; then
            echo "no gate JSON produced (scan failed to run)"
            echo "outcome=failure" > grype-image.outcome
            exit 0
          fi
          uncovered="$(node -e '
            const d = JSON.parse(require("fs").readFileSync(process.argv[1], "utf8"));
            const hi = new Set(["High", "Critical"]);
            const n = (d.matches || []).filter((m) => hi.has(m?.vulnerability?.severity)).length;
            process.stdout.write(String(n));
          ' "$GATE_JSON")"
          echo "uncovered high+ in matches[]: $uncovered"
          if [ "$uncovered" = "0" ]; then
            echo "outcome=success" > grype-image.outcome
          else
            echo "outcome=failure" > grype-image.outcome
          fi
      # ── Security-tab VEX coupling (issue #181) ──────────────────────────────
      # A VEX-FREE SARIF (every high+ present) with `.vex/`-derived suppressions[]
      # injected, uploaded to the Security tab so a covered CVE becomes a dismissed
      # alert whose suppression is DERIVED from `.vex/` (drop the record → next
      # scan omits the suppression → dismiss-alerts re-opens). Visibility-only;
      # does NOT feed the gate. From the SAME SBOM — no re-analysis.
      - id: grype-full
        name: Grype VEX-free SARIF (Security-tab suppression view, from the SBOM)
        if: always()
        continue-on-error: true # visibility path only; never fails the job
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          grype-version: v0.114.0
          sbom: image.sbom.json
          fail-build: false # do not gate on this scan
          severity-cutoff: high
          output-format: sarif
      - name: Inject VEX suppressions into SARIF
        if: always()
        env:
          FULL_SARIF: ${{ steps.grype-full.outputs.sarif }}
        run: |
          if [ -z "$FULL_SARIF" ] || [ ! -f "$FULL_SARIF" ]; then
            echo "no un-fed SARIF produced; skipping suppression injection"
            : > grype-ministack-image.suppressed.sarif
            exit 0
          fi
          node .github/scripts/vex-to-sarif-suppressions.mjs \
            "$FULL_SARIF" grype-ministack-image.suppressed.sarif .vex/CVE-*.openvex.json
      # VEX-FREE JSON carrying the distro/gate severity per CVE for the VEX report's
      # gate-vs-badge column (#208) — accepted base-image CVEs present with their
      # gate severity. From the SAME SBOM. Report-only.
      - id: grype-json
        name: Grype VEX-free JSON (gate severity for the VEX report #208, from the SBOM)
        if: always()
        continue-on-error: true # report-only; must not fail the gate job
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          grype-version: v0.114.0
          sbom: image.sbom.json
          fail-build: false
          severity-cutoff: high
          output-format: json
      - name: Stage grype JSON for the gate-severity artifact
        if: always()
        env:
          GRYPE_JSON: ${{ steps.grype-json.outputs.json }}
        run: |
          if [ -n "$GRYPE_JSON" ] && [ -f "$GRYPE_JSON" ]; then
            cp "$GRYPE_JSON" grype-ministack-image.json
          else
            echo "no grype JSON produced; staging empty file"
            : > grype-ministack-image.json
          fi
      - name: Upload VEX-suppressed SARIF to Security tab
        id: upload-suppressed
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: grype-ministack-image.suppressed.sarif
          category: grype-ministack-image
      # Dismiss alerts whose SARIF result carries a suppressions[] (VEX-covered),
      # and RE-OPEN any previously so-dismissed alert whose suppression has since
      # disappeared (a dropped `.vex/` record). Dismissal is a repo-GLOBAL
      # property, so this runs on the default branch only (never on PRs).
      - name: Dismiss VEX-suppressed alerts (default branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: advanced-security/dismiss-alerts@a18f986bdb40edba0dd7a74382c15d4a3d50a1c8 # v2.0.3
        with:
          sarif-id: ${{ steps.upload-suppressed.outputs.sarif-id }}
          sarif-file: grype-ministack-image.suppressed.sarif
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: grype-ministack-image-sarif
          path: |
            ${{ steps.grype.outputs.json }}
            grype-ministack-image.suppressed.sarif
            grype-ministack-image.json
          if-no-files-found: warn
      - name: Enforce Grype image result (hard-fail on any uncovered high+ CVE)
        if: always()
        run: |
          source grype-image.outcome
          echo "grype ministack-image step outcome=$outcome (fails on any high+ CVE not covered by a .vex/ record)"
          test "$outcome" = "success"

  # ── Trivy (second vuln scanner, alongside Grype) ────────────────────────
  # Trivy (Aqua Security, Apache-2.0) runs as a second vuln scanner next to the
  # Grype jobs above. It is a deliberate DUAL-SCANNER overlap: Grype and Trivy
  # use DIFFERENT vulnerability databases, so they surface different CVEs on the
  # same target — running both widens coverage (on the pinned image the high+
  # sets diverge: 47 grype ∪ 27 trivy = 50 union). Trivy is also the intended
  # full-tree backstop for the license-UNKNOWN / rider gap that
  # dependency-review's list mode can't fail closed on (docs/SECURITY-TOOLING.md,
  # #77 scope).
  #
  # Failure policy is SPLIT (#84):
  #   * trivy-fs   — REPORT-ONLY (source tree; mirrors the report-only Grype FS
  #                  job's posture for filesystem scanning — no VEX, no flip).
  #   * trivy-image — HARD-FAIL, VEX-gated (mirrors the flipped Grype
  #                  `ministack-image` job): the same `.vex/` OpenVEX
  #                  `not_affected` records gate it via Trivy's `--vex`
  #                  (fed through the `TRIVY_VEX` env, a comma-separated file
  #                  list — Trivy's `--vex` takes files, not a directory).
  #
  # The Trivy vuln DB FLOATS by design (like Grype's DB) so newly-disclosed
  # CVEs are caught without a repo change; it is cached across runs via
  # actions/cache (rolling github.run_id key, mirroring the mutation/fuzz
  # caches in ci.yml) so runs don't re-download it every time. The trivy-action
  # is SHA-pinned; the floating DB is documented in docs/PINNING.md.
  #
  # Trivy auto-discovers the committed trivy.yaml (repo root); scan policy stays
  # in the workflow flags below, not in that file.
  #
  # Both jobs keep the produce → always-upload → ENFORCE shape: run the action
  # with `continue-on-error: true` (so a finding never fails the STEP and the
  # SARIF always uploads), persist the step's outcome to a `*.outcome` file,
  # always-upload SARIF (artifact + Security tab), then a final `if: always()`
  # step sources the outcome. trivy-fs only LOGS it (report-only); trivy-image
  # ENFORCES it (`test "$outcome" = "success"`).

  # trivy-fs — filesystem vuln scan of the repo source (Trivy analog of the
  # Grype FS job).
  trivy-fs:
    name: Trivy FS scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Cache the (floating) Trivy vuln DB across runs. Rolling run_id key so the
      # post-job save always persists a fresh DB; restore-keys prefix-matches the
      # most recent prior cache (same pattern as the mutation/fuzz caches).
      - name: Cache Trivy DB
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: |
            trivy-db-
      - id: trivy
        name: Run Trivy FS (SARIF; report-only)
        continue-on-error: true # report-only: never fail the job on this step
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          # Pin the trivy ENGINE (#183) — matches trivy-action v0.36.0's own
          # default (v0.70.0), made explicit so local↔CI (and run↔run) don't
          # drift when the action later bumps its bundled default. The vuln DB
          # still floats by design. This is the step that INSTALLS trivy; the
          # report-table step below reuses it via skip-setup-trivy.
          version: v0.70.0
          scan-type: fs
          scan-ref: '.'
          format: sarif
          output: trivy-fs.sarif
          cache-dir: ${{ github.workspace }}/.cache/trivy
      - name: Record outcome
        if: always()
        # Pass the (trusted, enum-valued) step outcome via env rather than inline
        # interpolation, per the repo's zizmor-clean / no-template-injection rule.
        env:
          TRIVY_OUTCOME: ${{ steps.trivy.outcome }}
        run: echo "outcome=$TRIVY_OUTCOME" > trivy-fs.outcome
      - name: Emit human-readable table (report artifact)
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: '.'
          format: table
          output: trivy-fs.txt
          cache-dir: ${{ github.workspace }}/.cache/trivy
          skip-setup-trivy: 'true' # DB already fetched by the SARIF step above
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
      - name: Upload Trivy FS reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-fs-reports
          path: |
            trivy-fs.sarif
            trivy-fs.txt
          if-no-files-found: warn
      - name: Report Trivy FS outcome (report-only — never fails)
        if: always()
        run: |
          # Report-only: LOG the outcome, do NOT fail the job. Only the IMAGE
          # jobs hard-fail (#84); the filesystem source scan stays report-only.
          source trivy-fs.outcome
          echo "trivy-fs step outcome=$outcome (report-only — not enforced)"

  # trivy-image — vuln scan of the pinned MiniStack emulator image by digest
  # (Trivy analog of the flipped Grype `ministack-image` job). HARD-FAIL,
  # VEX-gated (#84): the image is third-party and pinned by digest, so we can't
  # patch CVEs inside it — the ~50 unfixable base-image high+ CVEs are accepted
  # via the same `.vex/` OpenVEX `not_affected` records the Grype job uses.
  #
  # HOW VEX REACHES TRIVY: through the committed `trivy.yaml`'s `vulnerability.vex`
  # list, which Trivy auto-discovers from the CWD. The trivy-action (v0.36.0) has
  # NO `vex` input and does NOT forward a `TRIVY_VEX` env to Trivy's `--vex` flag
  # (verified against its entrypoint — it runs `trivy <type> <ref>` with no extra
  # flags), so the env route silently loaded ZERO VEX docs and the gate wrongly
  # fired; the `trivy.yaml` route is what actually loads them. See trivy.yaml.
  #
  # SEVERITY + EXIT via the action's INPUTS (not env): the action UNSETS
  # TRIVY_SEVERITY for SARIF output unless `limit-severities-for-sarif: true`, so
  # severity/exit-code are passed as `severity`/`exit-code` inputs with
  # `limit-severities-for-sarif: true` to keep the HIGH,CRITICAL floor. `exit-code:
  # 1` fails Trivy on any UNCOVERED high+ CVE; `continue-on-error: true` keeps that
  # off the STEP so the SARIF always uploads, and the final `if: always()` step
  # enforces the saved outcome (produce → always-upload → enforce).
  trivy-image:
    name: Trivy MiniStack image scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Cache Trivy DB
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: |
            trivy-db-
      # VEX comes from the committed trivy.yaml (auto-discovered), NOT a flag/env.
      # NOTE: this digest MUST match the image pinned in ci.yml and the Grype
      # ministack-image job above (ministackorg/ministack:full@sha256:636c4ef5...).
      # Keep all three in sync; if ci.yml bumps the digest, bump it here too.
      # SCAN ONCE (#263): a single Trivy image scan emits JSON — the richest
      # format — and the SARIF (Security tab) + human table are DERIVED from that
      # saved JSON via `trivy convert`, with NO re-scan. Previously this job ran
      # THREE full image scans (SARIF gate + table + JSON for #208); the image
      # analysis is identical each time, so that was ~2 wasted full scans/run.
      # JSON also carries the distro/gate severity the #208 column needs (SARIF
      # does not), so JSON is the correct single source.
      - id: trivy
        name: Run Trivy image (JSON; hard-fail, VEX-gated)
        continue-on-error: true # keep failure OFF the step so the report always derives + uploads; enforced below
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          # Pin the trivy ENGINE (#183) — explicit == the action's own v0.70.0
          # default; DB still floats. This step INSTALLS trivy; the convert steps
          # below reuse the binary (skip-setup-trivy) + cached result.
          version: v0.70.0
          scan-type: image
          image-ref: 'ministackorg/ministack:full@sha256:636c4ef52bff20e29f161d24e895359b2927f72a143d726792faa86160043ca9'
          format: json
          output: trivy-image.json
          cache-dir: ${{ github.workspace }}/.cache/trivy
          # Severity floor + hard-fail via inputs. VEX auto-loads from the
          # committed trivy.yaml, so `exit-code: 1` fires iff a HIGH,CRITICAL
          # remains UNCOVERED by a `.vex/` record — the gate signal, captured
          # below. The JSON already carries the distro/gate severity for #208.
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
      - name: Record outcome
        if: always()
        # Pass the (trusted, enum-valued) step outcome via env rather than inline
        # interpolation, per the repo's zizmor-clean / no-template-injection rule.
        env:
          TRIVY_OUTCOME: ${{ steps.trivy.outcome }}
        run: echo "outcome=$TRIVY_OUTCOME" > trivy-image.outcome
      # Derive SARIF (Security tab) + the human table from the saved JSON — NO
      # re-scan. `trivy convert` re-renders a saved result into any format; the
      # JSON was already severity-filtered + VEX-gated, so both derived outputs
      # reflect the gated view. skip-setup-trivy reuses the binary from the scan.
      - name: Convert Trivy JSON to SARIF + table (no re-scan)
        if: always()
        continue-on-error: true
        env:
          TRIVY_JSON: trivy-image.json
        run: |
          # If the scan produced no JSON (e.g. install failed), emit nothing —
          # the enforce step below fails on the recorded non-success outcome.
          if [ ! -s "$TRIVY_JSON" ]; then
            echo "no Trivy JSON produced; skipping convert"
            exit 0
          fi
          trivy convert --format sarif --output trivy-image.sarif "$TRIVY_JSON"
          trivy convert --format table "$TRIVY_JSON" | tee trivy-image.txt
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
      - name: Upload Trivy image reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-image-reports
          path: |
            trivy-image.sarif
            trivy-image.txt
            trivy-image.json
          if-no-files-found: warn
      - name: Enforce Trivy image result (hard-fail on any uncovered high+ CVE)
        if: always()
        run: |
          # Hard-fail (VEX-gated): the scan step ran with exit-code 1 + TRIVY_VEX,
          # so its outcome is `failure` iff a HIGH,CRITICAL remains uncovered by a
          # .vex/ record. Mirrors the flipped Grype ministack-image enforce.
          source trivy-image.outcome
          echo "trivy-image step outcome=$outcome (fails on any high+ CVE not covered by a .vex/ record)"
          test "$outcome" = "success"

  # trivy-config (cdk.out misconfig scan) — DELIBERATELY OMITTED for #133.
  # Decision (recorded per acceptance criterion): DEFER as checkov-redundant
  # (YAGNI). The synthesized CloudFormation in cdk.out is already scanned by the
  # `iac` job (checkov + cfn-lint), which is the REQUIRED code-scanning gate in
  # the main-branch ruleset. Adding trivy config would duplicate that IaC
  # coverage for no new signal here. #133 scope is vuln scanning (FS + image);
  # add trivy-config later only if a concrete gap in checkov's CFN coverage is
  # identified. Recorded in docs/SECURITY-TOOLING.md.

  # ── VEX report (two-ledger reconciliation, #189) ────────────────────────
  # A per-push, human-readable reconciliation of the committed `.vex/` records
  # (the durable governance ledger) against the GitHub Code Scanning ALERTS
  # (the live Security-tab ledger) — so every accepted/known image CVE is
  # visible with its status + suggested justification + revisit cadence, and
  # anything needing a human is flagged: an uncovered high+ (Decision needed),
  # a VEX-accepted item whose alert is still OPEN (VEX drift, #186 wiring gap),
  # a dismissed alert with NO backing `.vex/` record (Undocumented dismissal,
  # #167 inverse-drift), an overdue revisit, or a stale record.
  #
  # Built from the Alerts API — NOT a re-scan and NOT SARIF: the API is the
  # UNION of every scanner (GitHub already merged grype+trivy), normalized, and
  # is the ONLY source that carries alert STATE (open/dismissed/fixed) — the
  # signal the reconciliation needs. Logic is 100%-covered + mutation-tested +
  # fuzzed (`alerts-findings.*`, `vex-report.*`). REPORT-ONLY (never fails; the
  # hard-fail gate is the ministack-image/trivy-image jobs). `needs:` the image
  # jobs so their alerts are uploaded before we read them (avoids the
  # last-upload lag noted in alerts-findings.ts).
  vex-report:
    name: VEX report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ministack-image, trivy-image]
    if: always() # report even if a gate job failed — the drift view still helps
    permissions:
      contents: read
      security-events: read # read the Code Scanning alerts
      pull-requests: write # post/update the sticky PR comment
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.17.0' # matches the mise.toml pin (single-sourced there)
      # Pull the CURRENT-run image-scan SARIFs (produced by the ministack-image /
      # trivy-image jobs this run `needs:`) so we can cross-check the Alerts API
      # against the CURRENT scan (#210) — NO re-scan. Non-fatal if absent (e.g. a
      # gate job errored before uploading): the report then renders with no scan
      # ledger (`--scan-cves` omitted → the pre-#210 behavior, no false clears).
      - name: Download current image-scan SARIFs
        id: dl-sarifs
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: scan-sarifs
          # Both image-scan artifacts; merge into one dir so the extractor globs them.
          pattern: '{grype-ministack-image-sarif,trivy-image-reports}'
          merge-multiple: true
      # Fetch the Code Scanning alerts for THIS ref (all states), then normalize
      # + render. `gh` reads the ref from the run context; on a PR that's the
      # merge ref, on push the branch. REF is passed via env (no interpolation
      # in the shell body), per the repo's no-injection rule.
      - name: Build + render VEX report
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/code-scanning/alerts?ref=${REF}&per_page=100" \
            > alerts.json 2>/dev/null || echo '[]' > alerts.json
          # `fixed`/`dismissed` alert state is anchored to the DEFAULT BRANCH, so
          # on a PR merge ref they are absent (0 fixed/dismissed) — the "recently
          # resolved" + drift signals would silently vanish. Also fetch main's
          # alerts and merge them back in (#210, mergeAlertLedgers): open findings
          # still come from the run ref (digest-bump-correct), main supplies the
          # resolved/dismissed history. On a push-to-main run REF already IS main,
          # so this is the same set — harmless. Non-fatal if it can't be fetched.
          main_arg=""
          if [ "${REF}" != "refs/heads/main" ]; then
            if gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/code-scanning/alerts?ref=refs/heads/main&per_page=100" \
              > main-alerts.json 2>/dev/null; then
              main_arg="--main main-alerts.json"
            fi
          fi
          # Restrict to the image-scan categories so unrelated code-scanning
          # alerts (SonarQube, CodeQL) don't leak into the VEX/image report.
          # shellcheck disable=SC2086  # $main_arg is an intentional flag pair
          node .github/scripts/alerts-findings.mjs alerts.json findings.json \
            $main_arg grype-ministack-image trivy-image
          # "Recently resolved" window boundary: the LAST published release's
          # date ("resolved since users last saw a release"). Fall back to a
          # rolling 7-day window when there is no prior release yet (fresh repo)
          # or the lookup fails, so the block is always bounded, never all-history
          # (#210). Date-only (YYYY-MM-DD); the report compares calendar days.
          resolved_since="$(gh release view --json publishedAt \
            --jq '.publishedAt[0:10]' 2>/dev/null || true)"
          if [ -z "${resolved_since:-}" ]; then
            resolved_since="$(date -u -d '7 days ago' +%Y-%m-%d)"
          fi
          echo "recently-resolved window since: ${resolved_since}"
          # Cross-check the (possibly stale) Alerts API against what the CURRENT
          # image scan actually reports (#210). Extract the CVE-id set from the
          # image SARIFs this run produced, then pass it via `--scan-cves` so an
          # alert that is `open` in the API but ABSENT from the current scan is
          # rendered "Scanner-cleared", not a false "Decision needed".
          #
          # We prefer Grype's VEX-FREE `suppressed.sarif` (every high+ CVE, incl.
          # VEX-covered ones) over the VEX-gated `grype.sarif` — the gated scan
          # DROPS covered CVEs, which would falsely "clear" a genuine VEX-drift
          # finding. Trivy has only its gated SARIF; its contribution is a UNION,
          # and the primary #210 case (uncovered python CVEs) was never VEX-
          # covered, so gating doesn't hide it. Only pass `--scan-cves` when we
          # actually extracted a scan set — an empty file must NOT be read as
          # "the scan found nothing" (which would clear every open alert).
          scan_arg=""
          scan_sarifs=()
          for f in scan-sarifs/grype-ministack-image.suppressed.sarif \
                   scan-sarifs/trivy-image.sarif; do
            [ -s "$f" ] && scan_sarifs+=("$f")
          done
          if [ "${#scan_sarifs[@]}" -gt 0 ]; then
            node .github/scripts/sarif-cve-ids.mjs scan-cves.json "${scan_sarifs[@]}"
            scan_arg="--scan-cves scan-cves.json"
            echo "current-scan CVE set: $(cat scan-cves.json)"
          else
            echo "no current-scan SARIFs found; skipping the stale-open cross-check"
          fi
          # Extract each scanner's GATE (distro) severity from the CURRENT scan's
          # JSON for the gate-vs-badge column (#208). The grype JSON is VEX-FREE
          # (so the accepted base-image CVEs — the ones whose badge overstates the
          # distro rating — carry their gate severity); trivy's is a union
          # contribution. Only pass `--gate-severities` when at least one JSON
          # was produced; an empty file simply contributes nothing.
          gate_arg=""
          gate_jsons=()
          for f in scan-sarifs/grype-ministack-image.json \
                   scan-sarifs/trivy-image.json; do
            [ -s "$f" ] && gate_jsons+=("$f")
          done
          if [ "${#gate_jsons[@]}" -gt 0 ]; then
            node .github/scripts/gate-findings.mjs gate-severities.json "${gate_jsons[@]}"
            gate_arg="--gate-severities gate-severities.json"
            echo "gate-severity map: $(cat gate-severities.json)"
          else
            echo "no current-scan JSON found; skipping the gate-vs-badge column"
          fi
          # shellcheck disable=SC2086  # $scan_arg / $gate_arg are intentional flag pairs
          node .github/scripts/vex-report.mjs .vex findings.json \
            "$(date -u +%Y-%m-%d)" HIGH vex-report.md "${resolved_since}" $scan_arg $gate_arg
          cat vex-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload VEX report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vex-report
          path: |
            vex-report.md
            findings.json
          if-no-files-found: warn
      # Sticky PR comment (hidden-marker upsert, like license-review-poller.yml).
      # PRs only; same-repo guard (a fork PR's read-only token can't comment).
      - name: Post/update sticky PR comment
        # NON-FATAL: the VEX report is report-only and already produced (job
        # summary + uploaded artifact). This step only mirrors it into a PR
        # comment — a COSMETIC convenience. GitHub's comments API intermittently
        # returns an HTML rate-limit/5xx page instead of JSON, which makes
        # `gh api --jq` exit with `invalid character '<' …` and (under `set -e`)
        # would red an otherwise-green report job. `continue-on-error` keeps the
        # transient comment hiccup from failing the job; the report itself is
        # unaffected. (Observed on run 29539235273.)
        continue-on-error: true
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          marker='<!-- vex-report -->'
          body="$(printf '%s\n\n%s' "$marker" "$(cat vex-report.md)")"
          # Find an existing marker comment; PATCH it in place, else create one.
          # `|| true` on the lookup so a transient non-JSON API response yields an
          # empty url (→ create path) rather than aborting under `set -e`.
          url="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" --paginate \
            --jq "[.[] | select(.body | contains(\"$marker\"))] | last | .url // empty" || true)"
          if [ -n "$url" ]; then
            gh api "$url" -X PATCH -f body="$body" >/dev/null
          else
            gh pr comment "$PR" --body "$body" >/dev/null
          fi

  # ── Malware / virus scan (ClamAV) ───────────────────────────────────────
  # Signature-based scan of the working tree (#149). ClamAV (GPLv2) runs as an
  # EXTERNAL scanner — a Docker service container + apt `clamdscan` over
  # loopback TCP — never linked or redistributed into repo output, the same
  # carve-out that clears shellcheck (GPLv3). The `clamav/clamav` image runs
  # freshclam at startup, so the scan always uses CURRENT virus signatures
  # (the DB floats by design, like Trivy's/Grype's vuln DB; the image is pinned
  # by digest). clamdscan has no machine-readable output, so clamav-to-sarif.mjs
  # parses its text log into SARIF (every hit = level error / security-severity
  # 10.0). Hard-fail via produce → always-upload → enforce.
  clamav:
    name: ClamAV virus scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    services:
      clamav:
        image: clamav/clamav@sha256:6f4a9e7d616ffc8d1070200fe35ac860735fdd522161a1043f94856e6ee13c28
        ports:
          - 127.0.0.1:3310:3310
        # The image ships its own clamdcheck.sh HEALTHCHECK — use it (do NOT
        # override with a curl/wget cmd; the image lacks them). clamd only
        # reports healthy after freshclam has loaded the signature DB.
        options: >-
          --health-cmd "/usr/local/bin/clamdcheck.sh"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          npm-ci: 'false' # converter uses Node built-ins only; no deps needed
      - name: Wait for clamd (TCP 3310)
        run: timeout 300 bash -c 'until (echo > /dev/tcp/127.0.0.1/3310) 2>/dev/null; do sleep 5; done'
      - name: Install clamdscan client + point it at the service
        run: |
          sudo apt-get update || true
          sudo rm -f /var/lib/man-db/auto-update
          sudo apt-get install -y --no-install-recommends clamdscan
          sudo mkdir -p /etc/clamav
          cat << 'EOF' | sudo tee /etc/clamav/clamd.conf
          TCPSocket 3310
          TCPAddr 127.0.0.1
          EOF
          clamdscan --version
      - name: Run clamdscan (log; enforce after upload)
        run: |
          set +e
          clamdscan --verbose --log=clamdscan.txt --stream --fdpass --multiscan .
          echo "exit=$?" > clamav.outcome
      - name: Convert clamdscan log to SARIF
        if: always()
        run: node .github/scripts/clamav-to-sarif.mjs clamdscan.txt clamav.sarif
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: clamav.sarif
          category: clamav
      - name: Upload ClamAV reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clamav-reports
          path: |
            clamdscan.txt
            clamav.sarif
          if-no-files-found: warn
      - name: Enforce ClamAV result (hard-fail on any detection)
        if: always()
        run: |
          source clamav.outcome
          echo "clamdscan exit=$exit (non-zero = virus signature detected)"
          test "$exit" = "0"

  # ── SonarQube (code quality + security analysis) ─────────────────────────
  # SonarQube Community (#150) run fully credential-free against a service
  # container: self-generate a token via the first-boot admin API, scan, check
  # the quality gate. GOVERNANCE: the two SonarSource actions are LGPL-3.0 and
  # SonarQube is a single-vendor SonarSource product — a MAINTAINER-APPROVED
  # exception under the CI-only external-invocation carve-out (same as
  # shellcheck/ClamAV; the actions are invoked, never linked/redistributed).
  # The LGPL scan-action is exempted in the dependency-review gate via
  # allow-dependencies-licenses (#161). SARIF is derived by our own
  # sonar-to-sarif.mjs from the api/issues/search JSON — NOT okorach/sonar-tools,
  # which hard-requires GPL-2.0 Levenshtein (beyond the LGPL exception).
  # Failure policy is REPORT-ONLY (log the gate status, never fail — mirrors
  # trivy-fs), with a documented ratchet to enforce once the baseline is triaged.
  # See docs/SECURITY-TOOLING.md.
  sonarqube:
    name: SonarQube analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    services:
      sonarqube:
        # The detected-sonarqube-docs-api-key secrets rule matches "sonar…<40-hex>"
        # — i.e. this image digest and the SHA-pinned SonarSource actions below,
        # all PUBLIC REQUIRED pins, not API keys (a PROVEN false positive, #163).
        # The rule is globally --exclude-rule'd in the semgrep job (temporary,
        # until upstream semgrep/semgrep-rules#3994 lands), so no inline
        # suppression is needed here.
        image: sonarqube:community@sha256:160bd2f6a3485bd09b655ef22dd63c02bd1fa7ba82aa5d9973fd010b8bcca0b3
        ports:
          - 127.0.0.1:9000:9000
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: true
          SONAR_WEB_SYSTEMPASSCODE: passcode
        # NO --health-cmd, deliberately (same rule as MiniStack in AGENTS.md:
        # "do NOT gate on --health-cmd; POLL readiness in a step instead").
        # Why: a service-container health gate that never goes healthy makes
        # GitHub abort with "Failed to initialize container" and SKIP the job's
        # steps. SonarQube 26.7 has a ~5-min cold start (Elasticsearch + web +
        # CE), which RACES any fixed health-retry budget — and a health-cmd that
        # runs INSIDE the image depends on that image's tools (busybox vs GNU
        # grep/wget), which change across digest bumps. Both bit us on #162.
        # With no health-cmd, GitHub starts the container and proceeds straight
        # to the steps; the "Wait for SonarQube to report UP" step below gates
        # readiness using the RUNNER's curl+jq (version-independent) with a
        # generous budget.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # Sonar wants full history for new-code / blame
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          npm-ci: 'false' # converter uses Node built-ins only; no deps needed
      - name: Wait for SonarQube to report UP
        # SonarQube 26.7 cold start (ES + web + CE) is ~5 min, so poll generously
        # (90 × 5s = 7.5 min, within the job's 20-min timeout). Uses the runner's
        # curl+jq — no dependency on the image's internal tools.
        run: |
          for _ in $(seq 1 90); do
            status=$(curl -s http://localhost:9000/api/system/status | jq -r '.status // empty')
            echo "status=${status:-<no response yet>}"
            if [ "$status" = "UP" ]; then echo "SonarQube is UP"; exit 0; fi
            sleep 5
          done
          echo "::error::SonarQube did not reach UP in time"
          exit 1
      - name: Generate a scanner token (first-boot admin API)
        # SonarQube's documented first-boot admin/admin default for this
        # ephemeral, loopback-only container (analogous to MiniStack's test/test).
        # Passed via env — NOT a literal `-u admin:admin`, which the gitleaks
        # curl-auth-user rule flags; the env-var form is not a hardcoded secret.
        env:
          SONAR_BOOT_USER: admin
          SONAR_BOOT_PASS: admin
        run: |
          token=$(curl -s -u "$SONAR_BOOT_USER:$SONAR_BOOT_PASS" -X POST \
            "http://localhost:9000/api/user_tokens/generate?name=github-actions" | jq -r '.token')
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "::error::failed to generate SonarQube token"
            exit 1
          fi
          echo "::add-mask::$token"
          echo "SONAR_TOKEN=$token" >> "$GITHUB_ENV"
      - name: Create SonarQube project
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        run: |
          curl -s -X POST -H "Authorization: Bearer $SONAR_TOKEN" \
            "http://localhost:9000/api/projects/create?project=e2e-ministack&name=e2e-ministack" > /dev/null
      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_HOST_URL: http://localhost:9000
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=e2e-ministack
            -Dsonar.projectName=e2e-ministack
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,cdk.out/**,coverage/**,reports/**
      - name: Check quality gate (report-only)
        id: qg
        continue-on-error: true
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_HOST_URL: http://localhost:9000
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
      # produce → always-upload → enforce (same shape as the grype/trivy jobs):
      # the fetch+convert runs with continue-on-error so its result never fails
      # the STEP (the SARIF/artifact still upload), the outcome is saved, and a
      # final if: always() step enforces it. HONEST semantics: a SARIF is only
      # ever written from a REAL scan result — `curl -sf` fails on any non-2xx,
      # so on server-down / scan-never-ran NO sonar.sarif exists (we do NOT
      # fabricate an empty one: an empty SARIF under category `sonarqube` would
      # tell Code Scanning "analysis ran, found nothing" and RESOLVE prior
      # sonarqube alerts). A genuine 0-issue scan does yield a real empty-results
      # SARIF — that is a true "nothing found".
      - name: Fetch issues JSON + derive SARIF
        id: sarif
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        run: |
          curl -sf -H "Authorization: Bearer $SONAR_TOKEN" \
            "http://localhost:9000/api/issues/search?componentKeys=e2e-ministack&ps=500&p=1" \
            > sonar-issues.json
          node .github/scripts/sonar-to-sarif.mjs sonar-issues.json sonar.sarif
      - name: Record outcome
        if: always()
        env:
          SARIF_OUTCOME: ${{ steps.sarif.outcome }}
        run: echo "outcome=$SARIF_OUTCOME" > sonar.outcome
      # Upload only when a real SARIF was produced (steps.sarif succeeded). On
      # failure there is no file and we must NOT upload — an absent/empty SARIF
      # would wrongly resolve prior alerts; the enforce step below fails the job.
      - name: Upload SARIF to Security tab
        if: ${{ steps.sarif.outcome == 'success' }}
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: sonar.sarif
          category: sonarqube
      - name: Upload SonarQube reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sonarqube-reports
          path: |
            sonar.sarif
            sonar-issues.json
          if-no-files-found: warn
      - name: Enforce SonarQube analysis ran (fail on a non-real scan)
        if: always()
        run: |
          # The analysis producing a SARIF is a REAL gate: if the scan/convert
          # failed (server never came up, API error), fail the job — do NOT let
          # a missing SARIF pass silently. Only the quality-GATE verdict below
          # is report-only, not the analysis itself.
          source sonar.outcome
          echo "sonar SARIF step outcome=$outcome"
          test "$outcome" = "success"
      - name: Enforce quality gate (hard-fail on non-PASSED)
        if: always()
        env:
          QG_STATUS: ${{ steps.qg.outputs.quality-gate-status }}
        run: |
          # ENFORCED (#170): the SonarQube backlog was driven to zero (last open
          # finding fixed in #218), so the "Sonar way" gate now holds PASSED on
          # `main` — observed PASSED on three consecutive runs before this flip.
          # Fail on anything other than PASSED. FAIL-CLOSED: an empty status
          # (the quality-gate step errored — it is `continue-on-error`, and the
          # separate "Enforce SonarQube analysis ran" step already fails a
          # non-real scan) is NOT "PASSED", so this fails too, never passing on a
          # missing verdict. This is the report-only → enforce ratchet the job
          # was designed for (mirrors trivy-fs → trivy-image).
          echo "SonarQube quality gate status: ${QG_STATUS:-unknown}"
          test "$QG_STATUS" = "PASSED"

  # ── Software Bill of Materials ──────────────────────────────────────────
  # Syft generates a CycloneDX SBOM of the dependency tree (#77). Unlike the
  # vuln scanners this is INFORMATIONAL — there is no enforce step; it just
  # produces and always-uploads the SBOM artifact (the "produce → upload"
  # half of the repo pattern, minus enforce). CycloneDX is the chosen format;
  # the SBOM is artifact-only for now (attach to releases later when a release
  # process exists). It also feeds Grype/Trivy, which can consume an SBOM for
  # consistent component coverage.
  sbom:
    name: SBOM (Syft / CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: '.'
          format: cyclonedx-json
          output-file: sbom.cdx.json
          # We upload the artifact ourselves (below) with the repo's standard
          # if: always() pattern, so disable the action's own release upload.
          upload-artifact: false
      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: warn

  # ── Secrets ─────────────────────────────────────────────────────────────
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # full history so all commits are scanned
          persist-credentials: false
      - name: Install gitleaks
        # Pinned v8.30.1 + SHA-256 verify (content pin, not just a tag).
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
      - name: Run gitleaks (SARIF; enforce after upload)
        run: |
          set +e
          ./gitleaks detect --no-banner --redact \
            --report-format sarif --report-path gitleaks.sarif
          echo "exit=$?" > gitleaks.outcome
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: warn
      - name: Enforce gitleaks result
        if: always()
        run: |
          source gitleaks.outcome
          test "$exit" = "0"

  # ── Infrastructure-as-code (synthesized CloudFormation) ─────────────────
  iac:
    name: IaC scan (cfn-lint + checkov)
    # Runs on EVERY event (no path-gate). checkov is a REQUIRED code-scanning
    # tool in the `main` branch ruleset, which expects a checkov result for each
    # PR's commits; a path-gate (previously issue #15) made checkov skip on
    # non-CDK PRs, leaving the ruleset's code_scanning rule waiting forever and
    # deadlocking the merge. Always running it produces the required result. The
    # `npm run synth` here duplicates ci.yml's synth on doc-only changes — an
    # accepted cost for an always-satisfiable required gate.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      # Pin the Python used to install the scanners so the hash-pinned
      # requirements file (resolved against 3.12) installs reproducibly.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Synthesize CloudFormation
        run: npm run synth
      - name: Install scanners
        # Content-pinned install: every dist is hash-verified against the
        # committed lockfile (--require-hashes), so a re-published PyPI artifact
        # is rejected. Pins live in scanner-requirements/iac/requirements.txt.
        # --no-deps: the lockfile is a complete closure, and overrides/requirements.txt
        # forces aiohttp past checkov's declared <3.14.0 cap (security fix), which pip's
        # resolver would otherwise reject as a conflict.
        run: pip install --require-hashes --no-deps -r .github/scanner-requirements/iac/requirements.txt
      - name: cfn-lint (text report; errors-only enforce after upload)
        # cfn-lint is a linter (not a vuln scanner) and its SARIF formatter
        # needs unbundled deps, so keep it as text. Only the two expected W
        # warnings here; fail on errors only.
        run: |
          set +e
          cfn-lint cdk.out/*.template.json > cfn-lint.txt 2>&1
          cat cfn-lint.txt
          cfn-lint cdk.out/*.template.json --non-zero-exit-code error
          echo "exit=$?" > cfn-lint.outcome
      - name: checkov (SARIF; enforce after upload)
        run: |
          set +e
          checkov -d cdk.out --framework cloudformation -o sarif --output-file-path . --compact
          echo "exit=$?" > checkov.outcome
          checkov -d cdk.out --framework cloudformation --compact # human-readable
      - name: Upload checkov SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results_sarif.sarif
          category: checkov
      - name: Upload IaC reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: iac-reports
          path: |
            cfn-lint.txt
            results_sarif.sarif
          if-no-files-found: warn
      - name: Enforce IaC results
        if: always()
        run: |
          source cfn-lint.outcome; cfn=$exit
          source checkov.outcome; ckv=$exit
          echo "cfn-lint exit=$cfn  checkov exit=$ckv"
          test "$cfn" = "0" && test "$ckv" = "0"

  # ── Threat model (design-time artifact) ─────────────────────────────────
  threat-model:
    name: Threat model
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Node-only job (no dependency install): the validation below just runs
      # `node -e` over the committed JSON, so skip `npm ci`.
      - uses: ./.github/actions/setup
        with:
          npm-ci: 'false'
      # threat-composer is a design-time authoring tool (no CI generator that
      # works without a real Bedrock account), so the gate is simply: the
      # committed model parses and carries the expected sections. Edit it in
      # the Threat Composer app / VS Code extension; expand as the stack grows.
      - name: Validate threat-model.tc.json
        run: |
          node -e '
            const tc = require("./threat-model.tc.json");
            const need = ["schema","applicationInfo","threats","mitigations","assumptions"];
            const missing = need.filter((k) => !(k in tc));
            if (missing.length) { console.error("Missing sections:", missing); process.exit(1); }
            if (!tc.threats.length) { console.error("No threats defined"); process.exit(1); }
            console.log("threat-model.tc.json OK:", tc.threats.length, "threats");
          '

  # ── GitHub Actions workflow hardening ───────────────────────────────────
  # actionlint (correctness: schema, shellcheck) and zizmor (security:
  # injection, unpinned actions, permissions) together lint the workflow files.
  actionlint:
    name: Actionlint (workflow correctness)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Run actionlint
        # Content-pinned: download the release tarball directly and verify its
        # SHA-256 (matches the OSV/gitleaks pattern) instead of piping a
        # download script fetched unpinned-by-hash from raw.githubusercontent.com.
        # Hash is the published actionlint_1.7.12_checksums.txt entry for
        # linux_amd64. actionlint also runs shellcheck on `run:` blocks.
        run: |
          curl -sSfL -o actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          chmod +x actionlint
          ./actionlint -color

  zizmor:
    name: Zizmor (Actions audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7

  # ── In-code suppression inventory (report-only) ─────────────────────────
  # #202 (the in-code-comment arm of the suppression-governance program #167):
  # ripgrep the documented suppression-token catalog across the tree and
  # classify each hit into three buckets — raw (unregistered in-code
  # suppression, the debt this sweep exists to kill), registered (reason-bearing,
  # revisit-tracked exception — checkov Metadata skip, gitleaks allowlist,
  # dependency-review license allow, the .vex/ OpenVEX records — candidates to
  # MIGRATE into #167), and wiring (VEX-feed config / tool-defining docs — not a
  # suppression). ripgrep ships preinstalled on ubuntu-latest; the classifier +
  # SARIF/text builders are the jest-gated .github/scripts/suppression-inventory.ts
  # (100% coverage #124), driven by the thin .mjs shim.
  #
  # REPORT-ONLY (mirrors trivy-fs / sonarqube's report-first posture): it never
  # fails the job — it produces the report and always-uploads it (raw-bucket
  # SARIF at level=warning surfaces on the Security tab without gating). The
  # documented ratchet to hard-fail on the `raw` bucket lands once the
  # reason-bearing suppressions are triaged into the #167 registry.
  suppression-inventory:
    name: Suppression inventory (report-only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          npm-ci: 'false' # inventory uses Node built-ins + ripgrep only; no deps
      # ubuntu-latest does NOT ship ripgrep, so install it (same apt pattern as
      # the clamav job's clamdscan). The shim is ALSO fail-safe if rg is missing
      # (emits an empty report, never reds this report-only job), but install it
      # so the inventory actually runs.
      - name: Install ripgrep
        run: |
          sudo apt-get update || true
          sudo rm -f /var/lib/man-db/auto-update
          sudo apt-get install -y --no-install-recommends ripgrep
          rg --version | head -1
      - name: Run suppression inventory (report-only — never fails)
        run: |
          node .github/scripts/suppression-inventory.mjs \
            --sarif suppression-inventory.sarif \
            --text suppression-inventory.txt
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: suppression-inventory.sarif
          category: suppression-inventory
      - name: Upload inventory reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: suppression-inventory
          path: |
            suppression-inventory.sarif
            suppression-inventory.txt
          if-no-files-found: warn
