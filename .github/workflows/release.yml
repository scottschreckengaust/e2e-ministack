name: Release

# Conventional-Commits → release automation. On every push to `main`,
# release-please reads the commit history since the last release and keeps an
# open "release PR" up to date: it computes the next SemVer bump, regenerates
# CHANGELOG.md, and bumps the version. Merging that PR cuts the tagged GitHub
# Release. No release happens until the maintainer merges the release PR, so
# this is safe to run unattended (issue #91).
#
# Tag placement: the release PR branches off `main`; merging it lands the
# release commit on `main` and release-please tags THAT commit on the default
# branch — tags are never created on a disconnected branch.
#
# Requires the repo setting Settings -> Actions -> General -> "Allow GitHub
# Actions to create and approve pull requests" to be ENABLED, else the
# create-release-PR step fails ("GitHub Actions is not permitted to create or
# approve pull requests").
on:
  push:
    branches:
      - main
  workflow_dispatch: # allow the maintainer to reconcile the release PR manually

# Least privilege by default; the release job opts into the writes it needs.
permissions:
  contents: read

# Only one release reconciliation in flight per ref; never cancel an
# in-progress one (a half-applied release PR update is undesirable).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release PR + changelog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # create release-PR commits, tags, and the GitHub Release
      pull-requests: write # open/update the release PR
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
