name: CI

on:
  push:
  pull_request:
  workflow_dispatch: # allow manual runs
  schedule:
    # Weekly: run everything regardless of what changed.
    - cron: '0 6 * * 1'

# Least privilege — this workflow only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs for the same ref. Rapid PR pushes otherwise launch
# multiple full copies of the integration job, each mounting the host Docker
# socket and spawning sibling containers — wasteful and contention-prone.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide which jobs are relevant for this event. On schedule, everything
  # runs; on push/PR, jobs gate on whether matching paths changed.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Only run path detection on push/PR — on dispatch/schedule the event has
      # no `before` SHA, so paths-filter prints a noisy fallback message, and
      # the unit/mutation jobs already force-run on those events anyway.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        with:
          filters: |
            code:
              - 'bin/**'
              - 'lib/**'
              - 'lambda/**'
              - 'test/**'
              - 'fuzz/**'
              - 'stryker.config.mjs'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'cdk.json'
              - 'jest.config.js'
              - '.github/workflows/ci.yml'
              # docs/config so the unit job's lint/format checks run on them too
              - '**/*.md'
              - '.markdownlint-cli2.jsonc'
              - '.prettierrc.json'
              - '.prettierignore'

  # Fast, synth-only tier. Gates the expensive integration job below.
  unit:
    name: Unit + synth gate
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.17.0'
          cache: 'npm'
      - run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Lint (markdown)
        run: npm run lint:md
      - name: Format check (prettier)
        run: npm run format:check
      - name: Build
        run: npm run build
      - name: Unit tests (logic + CDK assertions/snapshot)
        # Writes reports/junit/unit.xml; upload it even on failure.
        run: npm run test:unit
      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit-unit
          path: reports/junit/unit.xml
          if-no-files-found: warn
      # cdk-nag (AwsSolutions) runs inside synth; fails on any finding.
      - name: CDK synth (cdk-nag security gate)
        run: npm run synth
      - name: Upload synthesized templates
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cdk-out
          path: cdk.out/
          if-no-files-found: warn

  # Mutation testing of the Lambda logic. Fails under the break threshold (80%).
  mutation:
    name: Mutation testing (Stryker)
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.17.0'
          cache: 'npm'
      - run: npm ci
      # Restore Stryker's incremental result cache so only mutants in changed
      # files are re-tested. The key uses github.run_id (unique every run) so
      # the cache ALWAYS saves in the post-job step — actions/cache skips the
      # save when the exact key already hit, so a per-commit/SHA key can fail
      # to persist. restore-keys prefix-matches the most recent prior cache.
      # The stryker config hash is in the key so a scope change (the `mutate`
      # glob) busts the cache.
      - name: Restore mutation cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: reports/mutation/incremental.json
          key: stryker-${{ hashFiles('stryker.config.mjs') }}-${{ github.run_id }}
          restore-keys: |
            stryker-${{ hashFiles('stryker.config.mjs') }}-
      - name: Mutation tests
        run: npm run test:mutation
      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-report
          path: reports/mutation/
          if-no-files-found: warn

  # Coverage-guided fuzzing (jazzer.js). Exploratory and time-boxed, so it runs
  # on schedule / manual dispatch — NOT on every push. Needs GLIBC >= 2.38
  # (ubuntu-latest is fine). A failing run means the fuzzer found an input that
  # violates a handler invariant; the crashing input is uploaded as an artifact.
  fuzz:
    name: Fuzzing (jazzer.js)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Headroom over the 120s (-max_total_time) fuzz run plus install/build.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.17.0'
          cache: 'npm'
      - run: npm ci
      # Persist the fuzzing corpus across runs so discovered inputs accumulate
      # and later runs start from prior coverage (rolling key, like mutation).
      - name: Restore fuzz corpus
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .fuzz-corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-
      - name: Run fuzzer (time-boxed)
        # Ensure the corpus dir exists — libFuzzer refuses to start without it,
        # and the cache restore is a no-op on the first (cold) run.
        run: |
          mkdir -p .fuzz-corpus
          npx jazzer fuzz/handler.fuzz .fuzz-corpus --sync=false -- -max_total_time=120
      - name: Upload crash inputs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashes
          path: crash-*
          if-no-files-found: ignore

  # MiniStack deploy + integration tests. Runs only if unit passed.
  integration:
    name: Integration (MiniStack)
    needs: unit
    # SECURITY: this job mounts the host Docker socket (--network host +
    # /var/run/docker.sock) and runs `npm ci` + `cdk deploy` against
    # PR-controlled code. On a bare `pull_request` event a fork PR would get
    # code execution on a socket-mounted runner (container-escape risk, rated
    # Critical in the threat model). Fork PRs can't read secrets, but they DO
    # run untrusted code, so gate this job to non-fork events only: push,
    # schedule, workflow_dispatch, and same-repo PRs. (GitHub-recommended
    # head-repo comparison for trusted-vs-fork.)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # MiniStack deploy + integration is the long pole (container pull, health
    # wait, bootstrap, deploy, tests); 30m gives headroom without burning the
    # 6h default if MiniStack/Lambda hangs.
    timeout-minutes: 30

    # NOTE: MiniStack is NOT run as a `services:` container.
    # Lambda / ECS / RDS / ElastiCache work by having MiniStack spawn *sibling*
    # containers on the host Docker daemon. That requires mounting
    # /var/run/docker.sock AND MiniStack's loopback being the host (so its
    # readiness probes reach the host-published sibling ports). A `services:`
    # container can mount the socket but can't join the host network, so
    # RDS/etc. hang in "creating". An explicit `docker run --network host`
    # step is the configuration that actually works (verified end-to-end).
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.17.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start MiniStack
        run: |
          docker run -d --name ministack \
            --network host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e LAMBDA_EXECUTOR=docker \
            -e MINISTACK_RDS_PUBLIC_ENDPOINT=1 \
            -e MINISTACK_HOST=localhost \
            ministackorg/ministack:full@sha256:c5ce466eb2e73b5f3af86a5a1aea780c1e8fcf8f04ec0e2042a5cf759d6dcdd3

      - name: Wait for MiniStack to be healthy
        run: |
          # The image ships its own python-based HEALTHCHECK; poll Docker's
          # reported health status rather than reimplementing the probe.
          for i in $(seq 1 30); do
            status="$(docker inspect -f '{{.State.Health.Status}}' ministack 2>/dev/null || echo missing)"
            echo "attempt $i: $status"
            [ "$status" = "healthy" ] && exit 0
            sleep 2
          done
          echo "MiniStack did not become healthy in time" >&2
          docker logs ministack || true
          exit 1

      - name: Build
        run: npm run build

      # Bare `cdk` (CLI >= 2.1000) honors AWS_ENDPOINT_URL for credentials and
      # CloudFormation. AWS_ENDPOINT_URL_S3 must ALSO be set — S3 virtual-host
      # addressing can't be inferred from the generic endpoint.
      - name: CDK bootstrap
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ENDPOINT_URL_S3: http://localhost:4566
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          CDK_DEFAULT_ACCOUNT: '000000000000'
          CDK_DEFAULT_REGION: us-east-1
        run: npm run bootstrap

      - name: CDK deploy
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ENDPOINT_URL_S3: http://localhost:4566
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          CDK_DEFAULT_ACCOUNT: '000000000000'
          CDK_DEFAULT_REGION: us-east-1
        run: npm run deploy

      - name: Run integration tests
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
        run: npm run test:integration

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit-integration
          path: reports/junit/integration.xml
          if-no-files-found: warn

      - name: MiniStack logs on failure
        if: failure()
        run: docker logs ministack > ministack.log 2>&1 || true

      - name: Upload MiniStack logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ministack-logs
          path: ministack.log
          if-no-files-found: ignore

      - name: Stop MiniStack
        if: always()
        run: docker rm -f ministack || true
