name: Setup (checkout + Node + npm ci)
description: >-
  Repo setup preamble factored out of the workflows (issue #27): checks out the
  repo, installs the pinned Node version with npm cache, and runs `npm ci`. The
  Node version is pinned ONCE here (the `node-version` input default) so a bump
  is a single edit instead of one per job. External actions inside this composite
  stay SHA-pinned, and the checkout sets `persist-credentials: false` to satisfy
  zizmor.

inputs:
  node-version:
    description: Node.js version to install (single source of truth for the pin).
    required: false
    default: '24.17.0'
  fetch-depth:
    description: >-
      checkout fetch-depth. Default 1 (shallow). Set to 0 for jobs that need
      full history (e.g. gitleaks).
    required: false
    default: '1'
  npm-ci:
    description: >-
      Whether to run `npm ci`. Set to 'false' for jobs that need Node but not
      the installed dependency tree (e.g. the threat-model JSON check).
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
        persist-credentials: false
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
    - if: inputs.npm-ci == 'true'
      shell: bash
      run: npm ci
