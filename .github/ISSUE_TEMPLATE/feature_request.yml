name: Feature request
description: Suggest an enhancement or new capability for the stack, tests, or tooling.
title: 'feat: <short summary>'
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem would this solve, or what is missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you would like to see. Mention which area it touches (CDK stack, Lambda, test tiers, CI workflows, security gates).
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, if any.
    validations:
      required: false
